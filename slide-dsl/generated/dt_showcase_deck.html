        <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0d0d0d;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
}
#topbar h1 {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60%;
}
#counter { font-size: 12px; color: #888; white-space: nowrap; }
#stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
.slide-frame {
    display: none;
    width: 1280px;
    height: 720px;
    border: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    border-radius: 4px;
    transform-origin: center center;
}
.slide-frame.active { display: block; }
#bottombar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: 52px;
    background: #1a1a1a;
    border-top: 1px solid #333;
    flex-shrink: 0;
}
.nav-btn {
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 7px 20px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
}
.nav-btn:hover  { background: #3a3a3a; color: #fff; }
.nav-btn:active { background: #444; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
#dots { display: flex; gap: 6px; align-items: center; }
.dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #444;
    cursor: pointer;
    transition: background 0.15s;
}
.dot.active { background: #00677F; }
.dot:hover  { background: #666; }
</style>

    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goto(current - 1);
});

window.addEventListener('resize', scaleFrames);
scaleFrames();
goto(0);
</script>
