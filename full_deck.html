<div class="shortcut">← → arrow keys to navigate</div>
<script>
var cur=0, total=15;
var dc=document.getElementById('dots');
for(var i=0;i<total;i++){
  var d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.dataset.i=i; d.onclick=function(){go(+this.dataset.i);};
  dc.appendChild(d);
}
function go(n){
  document.getElementById('s'+cur).style.display='none';
  dc.children[cur].classList.remove('active');
  cur=(n+total)%total;
  document.getElementById('s'+cur).style.display='block';
  dc.children[cur].classList.add('active');
  document.querySelector('.label').textContent='Slide '+(cur+1)+' / '+total;
}
function move(d){go(cur+d);}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')move(1);
  if(e.key==='ArrowLeft')move(-1);
});
</script>
