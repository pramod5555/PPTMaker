<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Top 10 macro trends for companies</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
  }

  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #efefef;
  }

  .hero {
    position: absolute;
    left: 0;
    top: 0;
    width: 1280px;
    height: 485px;
    background:
      radial-gradient(circle at 17% 46%, rgba(255,255,255,0.85) 0, rgba(255,255,255,0.8) 2%, rgba(255,255,255,0.28) 5%, rgba(255,255,255,0) 8%),
      radial-gradient(circle at 9% 78%, rgba(255,152,0,0.75) 0, rgba(255,152,0,0.55) 2.5%, rgba(255,152,0,0.0) 5.5%),
      radial-gradient(circle at 20% 87%, rgba(255,138,0,0.55) 0, rgba(255,138,0,0.38) 2.5%, rgba(255,138,0,0) 5.5%),
      radial-gradient(circle at 26% 83%, rgba(255,160,64,0.55) 0, rgba(255,160,64,0.35) 2.5%, rgba(255,160,64,0) 5.5%),
      radial-gradient(circle at 35% 85%, rgba(255,150,40,0.5) 0, rgba(255,150,40,0.3) 2.4%, rgba(255,150,40,0) 5.5%),
      radial-gradient(circle at 87% 28%, rgba(255,182,128,0.45) 0, rgba(255,182,128,0.22) 3%, rgba(255,182,128,0) 6.5%),
      radial-gradient(circle at 92% 72%, rgba(255,170,120,0.34) 0, rgba(255,170,120,0.18) 3%, rgba(255,170,120,0) 6.5%),
      radial-gradient(circle at 5% 12%, rgba(255,255,255,0.35) 0, rgba(255,255,255,0.16) 3%, rgba(255,255,255,0) 6%),
      radial-gradient(circle at 13% 23%, rgba(80,220,255,0.35) 0, rgba(80,220,255,0.15) 3%, rgba(80,220,255,0) 6%),
      linear-gradient(90deg, rgba(1,25,49,0.75) 0%, rgba(0,52,90,0.45) 28%, rgba(6,64,106,0.24) 48%, rgba(0,42,87,0.5) 70%, rgba(0,22,52,0.84) 100%),
      linear-gradient(180deg, #0a4d6b 0%, #0d2a4c 100%);
  }

  .hero::before {
    content: "";
    position: absolute;
    left: 585px;
    top: -10px;
    width: 345px;
    height: 520px;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(70, 200, 255, 0.08) 0px,
        rgba(70, 200, 255, 0.08) 2px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0) 4px
      ),
      linear-gradient(90deg, rgba(0,170,255,0.08), rgba(0,170,255,0.22), rgba(0,170,255,0.06));
    filter: blur(0.2px);
    opacity: 0.9;
  }

  .hero::after {
    content: "";
    position: absolute;
    right: -10px;
    top: -5px;
    width: 390px;
    height: 500px;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(95,190,255,0.85) 0px,
        rgba(95,190,255,0.85) 1.4px,
        rgba(0,0,0,0) 1.4px,
        rgba(0,0,0,0) 4px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(70,170,255,0.14) 0px,
        rgba(70,170,255,0.14) 1px,
        rgba(0,0,0,0) 1px,
        rgba(0,0,0,0) 7px
      ),
      linear-gradient(180deg, rgba(0,120,210,0.25), rgba(0,55,120,0.1));
    mix-blend-mode: screen;
    opacity: 0.9;
  }

  .blur-panel-left {
    position: absolute;
    left: 245px;
    top: 0;
    width: 65px;
    height: 485px;
    background: linear-gradient(180deg, rgba(210,235,245,0.18), rgba(255,255,255,0.08), rgba(190,215,230,0.14));
    box-shadow: 20px 0 30px rgba(255,255,255,0.05), -10px 0 20px rgba(0,0,0,0.12);
    opacity: 0.55;
  }

  .blur-panel-mid {
    position: absolute;
    left: 430px;
    top: 0;
    width: 28px;
    height: 485px;
    background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(190,220,240,0.12), rgba(255,255,255,0.1));
    box-shadow: 12px 0 22px rgba(255,255,255,0.08);
    opacity: 0.65;
  }

  .cyan-bars {
    position: absolute;
    left: 379px;
    top: 0;
    width: 60px;
    height: 300px;
    background:
      linear-gradient(180deg, rgba(0,0,0,0) 0 18%, rgba(58,220,255,0.8) 18% 27%, rgba(0,0,0,0) 27% 41%, rgba(58,220,255,0.8) 41% 51%, rgba(0,0,0,0) 51% 65%, rgba(58,220,255,0.8) 65% 78%, rgba(0,0,0,0) 78% 100%);
    filter: blur(0.2px);
    opacity: 0.8;
  }

  .chart-line {
    position: absolute;
    left: 721px;
    top: 220px;
    width: 400px;
    height: 170px;
  }

  .chart-line span {
    position: absolute;
    bottom: 0;
    width: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 0 solid transparent;
  }

  .chart-line .p1 { left: 0px; bottom: 18px; width: 46px; height: 22px; border-bottom: 95px solid rgba(255,165,90,0.85); clip-path: polygon(0 100%, 100% 0, 100% 100%); filter: blur(0.4px); }
  .chart-line .p2 { left: 39px; bottom: 20px; width: 42px; height: 20px; border-bottom: 120px solid rgba(255,185,110,0.9); clip-path: polygon(0 100%, 100% 0, 100% 100%); }
  .chart-line .p3 { left: 74px; bottom: 20px; width: 58px; height: 20px; border-bottom: 68px solid rgba(255,175,105,0.72); clip-path: polygon(0 100%, 100% 32%, 100% 100%); }
  .chart-line .p4 { left: 125px; bottom: 18px; width: 60px; height: 20px; border-bottom: 145px solid rgba(91,214,255,0.95); clip-path: polygon(0 100%, 100% 0, 100% 100%); }
  .chart-line .p5 { left: 178px; bottom: 18px; width: 62px; height: 20px; border-bottom: 82px solid rgba(78,204,255,0.88); clip-path: polygon(0 100%, 100% 38%, 100% 100%); }
  .chart-line .p6 { left: 233px; bottom: 18px; width: 72px; height: 20px; border-bottom: 162px solid rgba(109,222,255,0.98); clip-path: polygon(0 100%, 100% 0, 100% 100%); }
  .chart-line .p7 { left: 300px; bottom: 18px; width: 84px; height: 20px; border-bottom: 105px solid rgba(74,210,255,0.92); clip-path: polygon(0 100%, 100% 28%, 100% 100%); }

  .numbers {
    position: absolute;
    right: 55px;
    top: 140px;
    color: rgba(225,245,255,0.98);
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 7px rgba(120,210,255,0.7);
  }

  .numbers .big {
    font-size: 64px;
  }

  .numbers .small {
    position: absolute;
    top: 226px;
    right: 18px;
    font-size: 44px;
    opacity: 0.95;
  }

  .lower {
    position: absolute;
    left: 0;
    top: 485px;
    width: 1280px;
    height: 235px;
    background: #efefef;
  }

  .divider {
    position: absolute;
    left: 634px;
    top: 514px;
    width: 2px;
    height: 210px;
    background: #8a1cf0;
  }

  .title {
    position: absolute;
    left: 699px;
    top: 548px;
    width: 520px;
    color: #000000;
    font-size: 57px;
    line-height: 0.97;
    font-weight: 800;
    letter-spacing: -1.5px;
  }

  .title .purple {
    color: #8f16f2;
  }

  .logo {
    position: absolute;
    left: 42px;
    top: 720px;
    transform: translateY(-32px);
    color: #8f16f2;
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
  }

  .copyright {
    position: absolute;
    right: 34px;
    bottom: 22px;
    color: #666666;
    font-size: 14px;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="hero"></div>
    <div class="blur-panel-left"></div>
    <div class="blur-panel-mid"></div>
    <div class="cyan-bars"></div>

    <div class="chart-line">
      <span class="p1"></span>
      <span class="p2"></span>
      <span class="p3"></span>
      <span class="p4"></span>
      <span class="p5"></span>
      <span class="p6"></span>
      <span class="p7"></span>
    </div>

    <div class="numbers">
      <div class="big">-23100</div>
      <div class="small">655</div>
    </div>

    <div class="lower"></div>
    <div class="divider"></div>

    <div class="title">
      Top <span class="purple">10</span> macro trends<br>
      for companies
    </div>

    <div class="logo">&gt;</div>

    <div class="copyright">Copyright © 2025 Accenture. All rights reserved.</div>
  </div>
</body>
</html>
