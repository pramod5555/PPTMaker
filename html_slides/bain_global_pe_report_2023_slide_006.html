<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Slide Replica</title>
<style>
  body{
    margin:0;
    background:#dcdcdc;
    font-family: Arial, Helvetica, sans-serif;
  }
  .slide{
    position:relative;
    width:1280px;
    height:720px;
    margin:0 auto;
    overflow:hidden;
    background:#dcdcdc;
    color:#111;
  }
  .title{
    position:absolute;
    left:42px;
    top:56px;
    width:1200px;
    font-size:37px;
    line-height:1.12;
    font-weight:400;
    color:#111;
    letter-spacing:0;
    white-space:nowrap;
  }
  .section{
    position:absolute;
    font-size:18px;
    line-height:1.2;
    font-weight:700;
    color:#111;
    white-space:nowrap;
  }
  .sub{z-index:1;
    position:absolute;
    font-size:18px;
    line-height:1.2;
    font-weight:400;
    color:#111;
    white-space:nowrap;
  }
  .kpi{
    position:absolute;
    font-size:17px;
    line-height:1;
    font-weight:400;
    color:#111;
    white-space:nowrap;
  }
  svg text{
    font-family: Arial, Helvetica, sans-serif;
    fill:#111;
  }
  .axislabel{
    font-size:17px;
    font-weight:400;
  }
  .ticklabel{
    font-size:17px;
    font-weight:400;
  }
  .bar-gray{ fill:#b3b3b3; }
  .bar-red{ fill:#e00000; }
</style>
</head>
<body>
<div class="slide">
  <div class="title">Banks pulled back and financing large deals became more challenging and costly</div>

  <div class="section" style="left:41px; top:146px;">Total LBO loans issued declined across regions</div>
  <div class="sub" style="left:38px; top:205px;">Syndicated LBO loan issuance, US &amp; Europe</div>
  <div class="kpi" style="left:36px; top:247px;">$500B</div>

  <div class="section" style="left:718px; top:146px;">Meanwhile, direct lending has been growing</div>
  <div class="sub" style="left:713px; top:205px;">Global direct lending funds raised</div>
  <div class="kpi" style="left:712px; top:247px;">$150B</div>

  <svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- LEFT CHART -->
    <!-- y-axis labels -->
    <text class="axislabel" x="61" y="337">400</text>
    <text class="axislabel" x="61" y="410">300</text>
    <text class="axislabel" x="61" y="483">200</text>
    <text class="axislabel" x="61" y="557">100</text>
    <text class="axislabel" x="82" y="629">0</text>

    <!-- baseline -->
    <line x1="102" y1="620" x2="650" y2="620" stroke="#111" stroke-width="1.2"/>

    <!-- left bars -->
    <rect class="bar-gray" x="111" y="542" width="33" height="78"/>
    <rect class="bar-gray" x="161" y="470" width="33" height="150"/>
    <rect class="bar-gray" x="210" y="468" width="33" height="152"/>
    <rect class="bar-gray" x="260" y="511" width="33" height="109"/>
    <rect class="bar-gray" x="309" y="468" width="33" height="152"/>
    <rect class="bar-gray" x="359" y="435" width="33" height="185"/>
    <rect class="bar-gray" x="408" y="392" width="33" height="228"/>
    <rect class="bar-gray" x="458" y="446" width="33" height="174"/>
    <rect class="bar-gray" x="508" y="492" width="33" height="128"/>
    <rect class="bar-gray" x="558" y="322" width="33" height="298"/>
    <rect class="bar-red"  x="607" y="472" width="34" height="148"/>

    <!-- left x labels -->
    <text class="ticklabel" x="104" y="642">2012</text>
    <text class="ticklabel" x="165" y="642">13</text>
    <text class="ticklabel" x="215" y="642">14</text>
    <text class="ticklabel" x="264" y="642">15</text>
    <text class="ticklabel" x="314" y="642">16</text>
    <text class="ticklabel" x="364" y="642">17</text>
    <text class="ticklabel" x="414" y="642">18</text>
    <text class="ticklabel" x="463" y="642">19</text>
    <text class="ticklabel" x="513" y="642">20</text>
    <text class="ticklabel" x="564" y="642">21</text>
    <text class="ticklabel" x="615" y="642">22</text>

    <!-- left annotation -->
    <text x="569" y="287" font-size="18" font-weight="700" fill="#e00000">(-50%)</text>
    <line x1="574" y1="295" x2="624" y2="295" stroke="#e00000" stroke-width="2"/>
    <line x1="574" y1="295" x2="574" y2="320" stroke="#e00000" stroke-width="2"/>
    <line x1="624" y1="295" x2="624" y2="465" stroke="#e00000" stroke-width="2"/>
    <line x1="624" y1="465" x2="624" y2="457" stroke="#e00000" stroke-width="2"/>
    <polygon points="624,472 619,462 629,462" fill="#e00000"/>

    <!-- RIGHT CHART -->
    <!-- y-axis labels -->
    <text class="axislabel" x="738" y="386">100</text>
    <text class="axislabel" x="749" y="507">50</text>
    <text class="axislabel" x="758" y="629">0</text>

    <!-- baseline -->
    <line x1="781" y1="620" x2="1326" y2="620" stroke="#111" stroke-width="1.2"/>

    <!-- right bars -->
    <rect class="bar-gray" x="786" y="594" width="34" height="26"/>
    <rect class="bar-gray" x="836" y="565" width="34" height="55"/>
    <rect class="bar-gray" x="886" y="539" width="33" height="81"/>
    <rect class="bar-gray" x="935" y="516" width="33" height="104"/>
    <rect class="bar-gray" x="985" y="521" width="33" height="99"/>
    <rect class="bar-gray" x="1035" y="470" width="33" height="150"/>
    <rect class="bar-gray" x="1085" y="464" width="33" height="156"/>
    <rect class="bar-gray" x="1134" y="401" width="34" height="219"/>
    <rect class="bar-gray" x="1185" y="453" width="33" height="167"/>
    <rect class="bar-gray" x="1233" y="307" width="34" height="313"/>
    <rect class="bar-red"  x="1284" y="343" width="34" height="277"/>

    <!-- right x labels -->
    <text class="ticklabel" x="786" y="642">2012</text>
    <text class="ticklabel" x="848" y="642">13</text>
    <text class="ticklabel" x="897" y="642">14</text>
    <text class="ticklabel" x="947" y="642">15</text>
    <text class="ticklabel" x="996" y="642">16</text>
    <text class="ticklabel" x="1046" y="642">17</text>
    <text class="ticklabel" x="1095" y="642">18</text>
    <text class="ticklabel" x="1145" y="642">19</text>
    <text class="ticklabel" x="1194" y="642">20</text>
    <text class="ticklabel" x="1243" y="642">21</text>
    <text class="ticklabel" x="1291" y="642">22</text>
  </svg>
</div>
</body>
</html>
