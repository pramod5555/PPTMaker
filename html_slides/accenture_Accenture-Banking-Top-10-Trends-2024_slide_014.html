<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Trend 3 Slide</title>
<style>
  body {
    margin: 0;
    background: #dddddd;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: Arial, Helvetica, sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #dddbd7;
  }

  .photo {
    position: absolute;
    left: 0px;
    top: 73px;
    width: 832px;
    height: 597px;
    background:
      radial-gradient(ellipse at 15% 78%, rgba(236,214,69,0.85) 0%, rgba(220,119,28,0.45) 18%, rgba(161,0,255,0.0) 36%),
      radial-gradient(ellipse at 8% 84%, rgba(85,224,215,0.75) 0%, rgba(65,178,255,0.28) 20%, rgba(0,0,0,0) 38%),
      radial-gradient(ellipse at 22% 88%, rgba(163,0,255,0.75) 0%, rgba(163,0,255,0.18) 14%, rgba(0,0,0,0) 30%),
      radial-gradient(circle at 60% 38%, rgba(255,227,221,0.95) 0%, rgba(212,135,130,0.55) 10%, rgba(0,0,0,0) 22%),
      radial-gradient(circle at 44% 20%, rgba(73,83,139,0.45) 0%, rgba(0,0,0,0) 18%),
      linear-gradient(90deg, rgba(78,9,10,0.85) 0%, rgba(53,17,22,0.3) 12%, rgba(122,91,129,0.45) 25%, rgba(34,16,25,0.5) 45%, rgba(80,31,43,0.2) 60%, rgba(13,7,16,0.65) 100%),
      radial-gradient(circle at 62% 48%, rgba(246,194,187,0.95) 0%, rgba(199,120,109,0.72) 10%, rgba(70,33,46,0.15) 23%, rgba(0,0,0,0) 35%),
      linear-gradient(180deg, rgba(62,38,74,0.25) 0%, rgba(24,12,24,0.1) 100%);
    background-color: #1d1018;
  }
  .photo:before {
    content: "";
    position: absolute;
    left: 245px;
    top: 5px;
    width: 350px;
    height: 555px;
    border-radius: 48% 52% 44% 46% / 20% 22% 40% 42%;
    background:
      radial-gradient(circle at 56% 23%, rgba(63,35,30,1) 0%, rgba(33,16,19,1) 15%, rgba(0,0,0,0) 24%),
      radial-gradient(circle at 58% 31%, rgba(242,207,195,0.95) 0%, rgba(213,153,139,0.82) 11%, rgba(119,66,75,0.55) 21%, rgba(0,0,0,0) 33%),
      radial-gradient(circle at 47% 23%, rgba(57,28,25,0.95) 0%, rgba(0,0,0,0) 18%),
      linear-gradient(180deg, rgba(76,56,74,0.6) 0%, rgba(64,49,67,0.82) 38%, rgba(35,24,29,0.95) 100%);
    transform: rotate(6deg);
    opacity: 0.95;
  }
  .photo:after {
    content: "";
    position: absolute;
    left: -35px;
    bottom: 28px;
    width: 560px;
    height: 235px;
    background:
      radial-gradient(ellipse at 20% 60%, rgba(243,231,85,0.72) 0%, rgba(237,149,42,0.5) 16%, rgba(145,23,189,0.52) 28%, rgba(0,0,0,0) 50%),
      radial-gradient(ellipse at 7% 78%, rgba(120,255,214,0.58) 0%, rgba(65,198,255,0.45) 20%, rgba(0,0,0,0) 40%),
      radial-gradient(ellipse at 33% 70%, rgba(0,190,96,0.28) 0%, rgba(0,0,0,0) 34%);
    filter: blur(2px);
    transform: rotate(-8deg);
  }

  .trend {
    position: absolute;
    left: 929px;
    top: 152px;
    color: #a000ff;
    font-size: 29px;
    font-weight: 700;
    line-height: 1.1;
  }

  .headline {
    position: absolute;
    left: 928px;
    top: 182px;
    width: 286px;
    color: #000;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.5px;
  }

  .callout {
    position: absolute;
    left: 658px;
    top: 431px;
    width: 574px;
    height: 181px;
    background: linear-gradient(180deg, #c21cff 0%, #a000ff 100%);
    box-sizing: border-box;
    padding: 28px 34px;
  }

  .callout p {
    margin: 0;
    color: #fff;
    font-size: 20px;
    line-height: 1.55;
    font-style: italic;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="photo"></div>
    <div class="trend">Trend: 3</div>
    <div class="headline">All the risk<br>we cannot see</div>
    <div class="callout">
      <p>In 2024, banks will be confronted by a variety of risks: some familiar, others less predictable. We have identified five that we think deserve attention. Planning for the unplanned will pay dividends.</p>
    </div>
  </div>
</body>
</html>
