<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Appendix Slide Replica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1280px;
    height: 720px;
    background: #d4e5e8;
    font-family: Arial, Helvetica, sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #d4e5e8;
  }
  .rule {
    position: absolute;
    left: 39px;
    width: 1202px;
    height: 1px;
    background: rgba(70, 78, 81, 0.65);
  }
  .rule.top {
    top: 196px;
  }
  .rule.bottom {
    top: 689px;
    background: rgba(145, 156, 160, 0.7);
  }
  .title {
    position: absolute;
    left: 39px;
    top: 228px;
    color: #000;
    font-size: 92px;
    line-height: 0.95;
    font-weight: 400;
    letter-spacing: -0.03em;
    white-space: nowrap;
  }
  .page-number {
    position: absolute;
    left: 39px;
    top: 732px;
    transform: translateY(-100%);
    color: #111;
    font-size: 23px;
    line-height: 1;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo {
    position: absolute;
    right: 32px;
    bottom: 15px;
    color: #1a1a1a;
    text-align: left;
  }
  .logo .brand {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 34px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.04em;
    color: #1c1c1c;
    white-space: nowrap;
  }
  .logo .sub {z-index:1;
    margin-top: 6px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 20px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: #2a2a2a;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="rule top"></div>
    <div class="title">Appendix</div>
    <div class="rule bottom"></div>
    <div class="page-number">18</div>
    <div class="logo">
      <div class="brand">J.P.Morgan</div>
      <div class="sub">ASSET MANAGEMENT</div>
    </div>
  </div>
</body>
</html>
