<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Trend 5: social rewilding</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at 88% 22%, rgba(255,250,220,0.92) 0%, rgba(255,239,164,0.75) 10%, rgba(255,196,82,0.46) 22%, rgba(255,166,54,0.18) 36%, rgba(255,166,54,0) 52%),
      radial-gradient(circle at 96% 88%, rgba(255,195,92,0.75) 0%, rgba(255,168,64,0.42) 20%, rgba(255,168,64,0) 44%),
      radial-gradient(circle at 42% 88%, rgba(255,236,80,0.75) 0%, rgba(255,164,56,0.45) 10%, rgba(255,164,56,0) 24%),
      radial-gradient(circle at 12% 25%, rgba(218,86,18,0.72) 0%, rgba(184,70,17,0.28) 14%, rgba(184,70,17,0) 34%),
      linear-gradient(180deg, rgba(46,28,18,0.75) 0%, rgba(103,53,22,0.28) 18%, rgba(163,95,35,0.14) 34%, rgba(91,47,25,0.35) 50%, rgba(196,128,53,0.28) 72%, rgba(196,128,53,0.42) 100%),
      linear-gradient(90deg, #6f4326 0%, #8c532e 22%, #a96a31 45%, #cd8235 72%, #e19a39 100%);
  }

  /* motion-blur atmosphere */
  .blur1, .blur2, .blur3, .blur4, .blur5, .blur6 {
    position: absolute;
    border-radius: 50%;
    filter: blur(18px);
    opacity: 0.42;
  }
  .blur1 {
    left: -64px;
    top: 46px;
    width: 557px;
    height: 102px;
    background: linear-gradient(90deg, rgba(69,45,27,0) 0%, rgba(82,55,33,0.8) 18%, rgba(121,77,37,0.75) 55%, rgba(184,144,73,0.22) 100%);
    transform: rotate(10deg);
    border-radius: 80px;
  }
  .blur2 {
    left: -77px;
    top: 292px;
    width: 742px;
    height: 38px;
    background: rgba(44,32,29,0.7);
    filter: blur(10px);
    border-radius: 40px;
  }
  .blur3 {
    left: -26px;
    top: 379px;
    width: 806px;
    height: 45px;
    background: rgba(88,48,29,0.55);
    filter: blur(14px);
    border-radius: 50px;
  }
  .blur4 {
    left: 18px;
    top: 476px;
    width: 934px;
    height: 64px;
    background: rgba(97,54,31,0.35);
    filter: blur(18px);
    border-radius: 60px;
  }
  .blur5 {
    left: 592px;
    top: 110px;
    width: 333px;
    height: 333px;
    background: radial-gradient(circle, rgba(92,35,28,0.48) 0%, rgba(92,35,28,0.34) 40%, rgba(92,35,28,0) 72%);
  }
  .blur6 {
    left: 347px;
    top: 233px;
    width: 230px;
    height: 76px;
    background: radial-gradient(circle, rgba(238,244,229,0.55) 0%, rgba(238,244,229,0.18) 48%, rgba(238,244,229,0) 76%);
    filter: blur(14px);
  }

  /* cyclist silhouette impression */
  .body {
    position: absolute;
    left: 654px;
    top: 36px;
    width: 403px;
    height: 437px;
    background: linear-gradient(180deg, rgba(247,218,199,0.42) 0%, rgba(237,191,162,0.48) 38%, rgba(134,70,46,0.34) 82%, rgba(90,43,27,0.16) 100%);
    border-radius: 48% 42% 39% 35% / 33% 30% 48% 44%;
    transform: rotate(18deg);
    filter: blur(4px);
    opacity: 0.9;
  }
  .backpack {
    position: absolute;
    left: 688px;
    top: 240px;
    width: 182px;
    height: 153px;
    background: radial-gradient(circle at 35% 40%, rgba(98,41,33,0.82) 0%, rgba(110,46,37,0.78) 36%, rgba(73,28,24,0.75) 72%, rgba(73,28,24,0.2) 100%);
    border-radius: 40% 40% 48% 48%;
    filter: blur(3px);
  }
  .arm {
    position: absolute;
    left: 844px;
    top: -6px;
    width: 294px;
    height: 91px;
    background: linear-gradient(90deg, rgba(214,170,145,0) 0%, rgba(221,179,152,0.6) 22%, rgba(217,168,138,0.68) 64%, rgba(166,103,75,0.55) 100%);
    border-radius: 60px;
    transform: rotate(-23deg);
    filter: blur(3px);
  }
  .leg1 {
    position: absolute;
    left: 724px;
    top: 440px;
    width: 36px;
    height: 265px;
    background: linear-gradient(180deg, rgba(54,29,24,0.86) 0%, rgba(32,19,18,0.86) 100%);
    border-radius: 20px;
    transform: rotate(-16deg);
    filter: blur(1px);
  }
  .leg2 {
    position: absolute;
    left: 803px;
    top: 517px;
    width: 40px;
    height: 213px;
    background: linear-gradient(180deg, rgba(48,28,22,0.86) 0%, rgba(26,18,16,0.86) 100%);
    border-radius: 20px;
    transform: rotate(34deg);
    filter: blur(1px);
  }

  /* bicycle */
  .wheel {
    position: absolute;
    border: 8px solid rgba(61,41,34,0.34);
    border-radius: 50%;
    filter: blur(2px);
  }
  .wheel.left {
    left: 287px;
    top: 571px;
    width: 326px;
    height: 326px;
  }
  .wheel.right {
    left: 1048px;
    top: 521px;
    width: 346px;
    height: 346px;
  }
  .rim-glow {
    position: absolute;
    border-radius: 50%;
    border: 12px solid rgba(255,170,65,0.14);
    filter: blur(8px);
  }
  .rim-glow.left {
    left: 301px;
    top: 585px;
    width: 298px;
    height: 298px;
  }
  .rim-glow.right {
    left: 1064px;
    top: 537px;
    width: 314px;
    height: 314px;
  }
  .frame1, .frame2, .frame3, .fork, .handle, .seat {
    position: absolute;
    background: rgba(64,40,30,0.46);
    transform-origin: left center;
    border-radius: 6px;
    filter: blur(1px);
  }
  .frame1 {
    left: 560px;
    top: 623px;
    width: 289px;
    height: 8px;
    transform: rotate(27deg);
  }
  .frame2 {
    left: 718px;
    top: 496px;
    width: 134px;
    height: 8px;
    transform: rotate(68deg);
  }
  .frame3 {
    left: 720px;
    top: 496px;
    width: 160px;
    height: 8px;
    transform: rotate(8deg);
  }
  .fork {
    left: 1046px;
    top: 515px;
    width: 173px;
    height: 8px;
    transform: rotate(78deg);
  }
  .handle {
    left: 962px;
    top: 332px;
    width: 90px;
    height: 6px;
    transform: rotate(45deg);
    opacity: 0.34;
  }
  .seat {
    left: 679px;
    top: 500px;
    width: 58px;
    height: 6px;
    transform: rotate(-13deg);
  }

  /* subtle wheel spokes hint */
  .spokes {
    position: absolute;
    border-radius: 50%;
    overflow: hidden;
    opacity: 0.08;
  }
  .spokes.left {
    left: 295px;
    top: 579px;
    width: 310px;
    height: 310px;
  }
  .spokes.right {
    left: 1057px;
    top: 530px;
    width: 328px;
    height: 328px;
  }
  .spokes.left::before, .spokes.right::before,
  .spokes.left::after, .spokes.right::after {
    content: "";
    position: absolute;
    left: 50%;
    top: -10%;
    width: 2px;
    height: 120%;
    background: rgba(32,20,18,0.9);
    transform-origin: center center;
  }
  .spokes.left::after, .spokes.right::after {
    transform: rotate(90deg);
  }

  .flare {
    position: absolute;
    border-radius: 50%;
    filter: blur(10px);
  }
  .flare.a {
    left: 451px;
    top: 574px;
    width: 71px;
    height: 71px;
    background: rgba(255,255,165,0.92);
  }
  .flare.b {
    left: 1087px;
    top: 332px;
    width: 122px;
    height: 122px;
    background: rgba(255,210,96,0.6);
  }
  .flare.c {
    left: 351px;
    top: 697px;
    width: 29px;
    height: 29px;
    background: rgba(255,118,58,0.7);
  }

  .diamond {
    position: absolute;
    width: 86px;
    height: 86px;
    border: 3px solid rgba(255,214,148,0.22);
    transform: rotate(45deg);
    left: 930px;
    top: 247px;
    filter: blur(1px);
  }
  .diamond::before, .diamond::after {
    content: "";
    position: absolute;
    inset: 11px;
    border: 2px solid rgba(255,214,148,0.16);
  }
  .diamond::after {
    inset: 24px;
  }

  .text-small {
    position: absolute;
    left: 109px;
    top: 272px;
    color: rgba(255,255,255,0.82);
    font-size: 25px;
    font-weight: 300;
    letter-spacing: 0;
  }
  .text-social {
    position: absolute;
    left: 110px;
    top: 306px;
    color: rgba(255,255,255,0.9);
    font-size: 58px;
    font-weight: 300;
    line-height: 1;
  }
  .text-rewilding {
    position: absolute;
    left: 510px;
    top: 382px;
    color: rgba(255,255,255,0.92);
    font-size: 108px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -1px;
  }
  .page {
    position: absolute;
    right: 12px;
    bottom: 14px;
    color: rgba(255,255,255,0.95);
    font-size: 18px;
    font-weight: 400;
  }

  .speck {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,244,210,0.45);
    filter: blur(0.3px);
  }

/* fix: correct background color */
.slide { background: #BE9B73 !important; background-color: #BE9B73 !important; }
</style>
</head>
