<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF F&D – slide_005 – IMF Weekend Read Ad</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #c8d8e8;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #ffffff;
  }

  /* Photo background — professional man in airport, approximated */
  .photo-bg {
    position: absolute; inset: 0;
    background: linear-gradient(
      140deg,
      #b8cce0 0%,
      #8aaac8 20%,
      #6890b8 40%,
      #90a8c0 60%,
      #c0d0e0 80%,
      #d8e4f0 100%
    );
  }
  /* Silhouette of person walking with luggage */
  .figure {
    position: absolute; right: 280px; top: 40px; bottom: 0;
    width: 360px;
    background: radial-gradient(ellipse at 50% 30%, rgba(60,80,120,0.4) 0%, transparent 60%);
  }
  /* Person body shape */
  .person {
    position: absolute; right: 320px; top: 60px;
    width: 260px; height: 580px;
    background: linear-gradient(180deg,
      #1a2840 0%,    /* dark head */
      #2a4060 10%,   /* shoulders / jacket */
      #344a6a 30%,   /* torso */
      #8090a8 50%,   /* lighter shirt/pants */
      #607090 70%,   /* legs */
      #202840 100%   /* feet/shoes */
    );
    border-radius: 120px 120px 20px 20px;
    opacity: 0.85;
  }

  /* Dark blue gradient overlay at bottom */
  .overlay {
    position: absolute; left: 0; bottom: 0; right: 0; height: 340px;
    background: linear-gradient(to top, rgba(10,30,70,0.95) 0%, rgba(10,30,70,0.85) 40%, transparent 100%);
  }

  /* Text */
  .imf-label {
    position: absolute; left: 56px; bottom: 200px;
    font-size: 52px; font-weight: 900; color: #ffffff; line-height: 1;
  }
  .imf-label span { font-weight: 400; margin-left: 12px; font-size: 52px; }

  .tagline {
    position: absolute; left: 56px; bottom: 136px;
    font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.5;
    max-width: 400px;
  }

  .cta {
    position: absolute; left: 56px; bottom: 64px;
    font-size: 22px; font-weight: 700; color: #ffffff;
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* QR code placeholder */
  .qr {
    position: absolute; right: 100px; bottom: 60px;
    width: 90px; height: 90px;
    background: #ffffff; border: 2px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #888; text-align: center;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="photo-bg"></div>
  <div class="figure"></div>
  <div class="person"></div>
  <div class="overlay"></div>

  <div class="imf-label">IMF<span>WEEKEND READ</span></div>
  <div class="tagline">Sign up now for cutting-edge research and analysis of key economic, finance, development, and policy issues shaping the world.</div>
  <div class="cta">Sign Up Today!</div>
  <div class="qr">[QR Code]</div>
</div>
</body>
</html>
