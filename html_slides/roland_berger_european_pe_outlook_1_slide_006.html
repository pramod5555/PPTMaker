<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Executive summary - Roland Berger</title>
<style>

    margin: 0;
    padding: 0;
    width: 1280px;
    height: 720px;
    background: #f4f4f4;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f4f4f4;
  }
  .slide * {
    box-sizing: border-box;
    position: absolute;
  }

  .title {
    left: 46px;
    top: 468px;
    font-size: 37px;
    line-height: 1;
    color: #111;
    font-weight: 400;
    white-space: nowrap;
    letter-spacing: -0.02em;
  }

  .rb-logo {
    left: 1124px;
    top: 24px;
    width: 118px;
    height: 54px;
  }
  .rb-logo .roland {
    right: 38px;
    top: 0;
    font-size: 20px;
    line-height: 1;
    color: #2a2a2a;
    font-weight: 400;
    text-align: right;
    letter-spacing: -0.02em;
  }
  .rb-logo .berger {
    right: 38px;
    top: 17px;
    font-size: 28px;
    line-height: 1;
    color: #222;
    font-weight: 400;
    text-align: right;
    letter-spacing: -0.04em;
  }
  .rb-logo .mark {
    right: 0;
    top: 0;
    width: 36px;
    height: 52px;
    background: linear-gradient(180deg, #d6dbde 0%, #9aa1a7 55%, #687179 100%);
    border-top-right-radius: 18px;
    border-bottom-right-radius: 18px;
    border-top-left-radius: 2px;
    border-bottom-left-radius: 2px;
    overflow: hidden;
  }
  .rb-logo .mark:before,
  .rb-logo .mark:after {
    content: "";
    position: absolute;
    left: 11px;
    width: 17px;
    height: 23px;
    background: #f4f4f4;
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
  }
  .rb-logo .mark:before { top: 0; }
  .rb-logo .mark:after { top: 26px; }

    left: 449px;
    top: 180px;
    width: 410px;
    height: 413px;
    overflow: hidden;
  }

    left: 0;
    top: 0;
    width: 268px;
    height: 198px;
    border-top-right-radius: 108px;
    border-bottom-right-radius: 108px;

      linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.1)),

  }

    content: "";
    position: absolute;
    left: -18px;
    top: 145px;
    width: 235px;
    height: 26px;
    background: linear-gradient(180deg, rgba(189,198,203,0.6), rgba(211,217,220,0.15));
    transform: rotate(7deg);
    filter: blur(1px);
    opacity: 0.55;

  .label2 {

    line-height: 1;

    font-weight: 600;
    font-style: italic;
    transform: rotate(14deg);
    transform-origin: left top;
    letter-spacing: -0.01em;

    height: 121px;
    background: linear-gradient(180deg, #007697 0%, #0787aa 58%, #16a2c8 100%);
    clip-path: polygon(28% 3%, 97% 10%, 69% 92%, 0 84%);

  }

  .bar2 {
    left: 47px;
    top: 160px;
    width: 133px;
    height: 72px;
    background: linear-gradient(180deg, #33b9ee 0%, #66d5ff 100%);
    clip-path: polygon(22% 0, 100% 8%, 80% 100%, 0 91%);

  }

  .pen {

    top: 4px;
    width: 162px;
    height: 122px;

    top: 39px;

    height: 34px;

    clip-path: polygon(0 14%, 72% 0, 72% 100%, 0 86%);

    top: 47px;
    width: 19px;
    height: 16px;
    background: linear-gradient(180deg, #c6cacf 0%, #ffffff 45%, #8a8f95 100%);
    clip-path: polygon(0 50%, 78% 0, 100% 50%, 78% 100%);

    left: 158px;
    top: 52px;
    width: 8px;
    height: 7px;
    background: linear-gradient(180deg, #73787e 0%, #2c3137 100%);
    clip-path: polygon(0 50%, 100% 0, 100% 100%);
  }

  .bottom-band {
    left: 0;
    bottom: 0;
    width: 1280px;
    height: 27px;
    background: #000;
  }

<body>
  <div class="slide">

        <div class="label1">48.4</div>
        <div class="label2">15.4</div>
        <div class="pen">

          <div class="ring"></div>
          <div class="metal"></div>
          <div class="tip"></div>
          <div class="point"></div>
        </div>
      </div>
    </div>

    <div class="rb-logo">
      <div class="roland">Roland</div>
      <div class="berger">Berger</div>

    </div>

  </div>
