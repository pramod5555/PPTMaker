<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF F&D – slide_001 – Geoeconomics Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    /* Aged yellow/gold background */
    background: #d4a017;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #1a1a1a;
  }
  /* Texture overlay */
  .texture {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(180,130,0,0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(100,70,0,0.2) 0%, transparent 50%);
  }

  /* Top masthead bar */
  .masthead {
    position: absolute; left: 0; top: 0; right: 0; height: 44px;
    background: #1a1a1a;
    display: flex; align-items: center;
  }
  .fd-logo {
    position: absolute; left: 24px; top: 0; height: 44px;
    display: flex; align-items: center;
    font-size: 28px; font-weight: 900; color: #ffffff; letter-spacing: -1px;
  }
  .masthead-right {
    position: absolute; right: 24px; top: 0; height: 44px;
    display: flex; align-items: center; gap: 32px;
    font-size: 10px; color: #ccc;
  }
  .masthead-right .pub { font-size: 11px; color: #fff; font-weight: 600; }
  .masthead-right .org { font-size: 9px; color: #aaa; letter-spacing: 0.5px; text-transform: uppercase; }

  /* Topic pills in header */
  .topics {
    position: absolute; left: 200px; top: 0; right: 220px; height: 44px;
    display: flex; align-items: center; gap: 0;
  }
  .topic {
    flex: 1; height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-left: 1px solid #444; padding: 0 12px; text-align: center;
  }
  .topic .label { font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .topic .name  { font-size: 10px; color: #ddd; line-height: 1.2; }

  /* Date tag */
  .date-tag {
    position: absolute; left: 24px; top: 56px;
    font-size: 10px; color: #5a3a00; font-weight: 600; letter-spacing: 0.5px;
  }

  /* Central collage — approximated as layered geometric shapes suggesting torn paper/photos */
  .collage {
    position: absolute; left: 320px; top: 44px; right: 160px; bottom: 140px;
    overflow: hidden;
  }
  /* Diagonal torn paper fragments */
  .frag-1 {
    position: absolute; left: 60px; top: 20px; width: 280px; height: 360px;
    background: linear-gradient(135deg, #e8dcc8 0%, #c8b896 50%, #a89060 100%);
    clip-path: polygon(20% 0%, 100% 5%, 90% 100%, 0% 95%);
    transform: rotate(-8deg);
  }
  .frag-2 {
    position: absolute; left: 200px; top: 10px; width: 240px; height: 320px;
    background: linear-gradient(160deg, #2a2a2a 0%, #444 40%, #666 100%);
    clip-path: polygon(10% 0%, 95% 8%, 85% 98%, 5% 92%);
    transform: rotate(5deg);
  }
  .frag-3 {
    position: absolute; left: 120px; top: 80px; width: 300px; height: 240px;
    background: linear-gradient(120deg, #f5f0e8 0%, #e0d8c8 100%);
    clip-path: polygon(5% 5%, 92% 0%, 98% 95%, 8% 100%);
    transform: rotate(-3deg);
    opacity: 0.85;
  }
  /* Hand/architecture silhouette suggestion */
  .silhouette {
    position: absolute; left: 160px; top: 60px; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(20,10,0,0.6) 0%, transparent 70%);
  }

  /* Bottom-left text */
  .main-title {
    position: absolute; left: 24px; bottom: 64px;
    font-size: 38px; font-weight: 900; color: #1a1a1a; letter-spacing: 1px;
    text-transform: uppercase; line-height: 1;
  }
  .subtitle {
    position: absolute; left: 24px; bottom: 20px;
    font-size: 18px; font-style: italic; color: #3a2000; line-height: 1.3;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="texture"></div>

  <div class="masthead">
    <div class="fd-logo">F&amp;D</div>
    <div class="topics">
      <div class="topic">
        <div class="label">Economic Theory</div>
        <div class="name">Robert Skidelsky<br>on Keynes</div>
      </div>
      <div class="topic">
        <div class="label">Commodities</div>
        <div class="name">Critical minerals and<br>national security</div>
      </div>
      <div class="topic">
        <div class="label">Trade Policy</div>
        <div class="name">Jamieson Greer<br>on tariffs</div>
      </div>
    </div>
    <div class="masthead-right">
      <div>
        <div class="pub">Finance &amp; Development</div>
        <div class="org">International Monetary Fund</div>
      </div>
    </div>
  </div>

  <div class="date-tag">June 2026</div>

  <!-- Collage approximation -->
  <div class="collage">
    <div class="frag-1"></div>
    <div class="frag-3"></div>
    <div class="frag-2"></div>
    <div class="silhouette"></div>
  </div>

  <div class="main-title">Geoeconomics</div>
  <div class="subtitle">And the return of<br>economic statecraft</div>
</div>
</body>
</html>
