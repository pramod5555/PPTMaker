<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Roland Berger Slide Replica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f3f3f3;
  }

  .bottom-band {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 1280px;
    height: 47px;
    background: #000;
    z-index: 2;
  }

  .title-block {
    position: absolute;
    left: 47px;
    top: 403px;
    width: 385px;
    height: 125px;
    color: #111;
    z-index: 5;
  }
  .title-a {
    position: absolute;
    left: 0;
    top: 3px;
    font-size: 27px;
    line-height: 1;
    font-weight: 400;
    color: #111;
  }
  .title-text {
    position: absolute;
    left: 67px;
    top: 0;
    width: 315px;
    font-size: 27px;
    line-height: 1.18;
    font-weight: 400;
    color: #111;
  }

  .hero {
    position: absolute;
    left: 516px;
    top: 180px;
    width: 342px;
    height: 413px;
    overflow: hidden;
    background:
      radial-gradient(130px 80px at 16% 89%, rgba(230,235,244,0.95) 0 35%, rgba(230,235,244,0) 36%),
      linear-gradient(180deg, #e8eaf0 0%, #f0f1f6 28%, #f4f5f8 100%);
    border-top-right-radius: 105px;
    border-bottom-right-radius: 108px;
    z-index: 4;
  }

  .hero .soft-col1,
  .hero .soft-col2,
  .hero .soft-col3 {
    position: absolute;
    top: -10px;
    height: 190px;
    filter: blur(5px);
    opacity: .55;
  }
  .hero .soft-col1 {
    left: 50px;
    width: 48px;
    background: linear-gradient(180deg, rgba(213,217,228,.7), rgba(255,255,255,0));
  }
  .hero .soft-col2 {
    left: 86px;
    width: 62px;
    background: linear-gradient(180deg, rgba(206,212,225,.72), rgba(255,255,255,0));
  }
  .hero .soft-col3 {
    left: 133px;
    width: 56px;
    background: linear-gradient(180deg, rgba(219,223,233,.72), rgba(255,255,255,0));
  }

  .hero .top-arm {
    position: absolute;
    left: 145px;
    top: 77px;
    width: 176px;
    height: 26px;
    background: linear-gradient(180deg, #e8bd9f 0%, #e7b897 60%, #dca582 100%);
    border-radius: 20px;
    transform: rotate(-3deg);
    z-index: 8;
    box-shadow: inset 0 -2px 1px rgba(150, 90, 60, 0.12);
  }
  .hero .top-arm::before {
    content: "";
    position: absolute;
    left: -16px;
    top: 8px;
    width: 23px;
    height: 11px;
    border-radius: 8px;
    background: linear-gradient(180deg, #edc8ae, #deac89);
  }

  .hero .paper-main {
    position: absolute;
    left: 0;
    top: 145px;
    width: 286px;
    height: 136px;
    background:
      linear-gradient(180deg, rgba(126,176,216,.7) 0 4px, transparent 4px 100%),
      repeating-linear-gradient(180deg, transparent 0 11px, rgba(181,190,206,.9) 11px 12px),
      #f8fafc;
    z-index: 3;
  }

  .hero .paper-top {
    position: absolute;
    left: 187px;
    top: 194px;
    width: 114px;
    height: 76px;
    background: #fbfcfe;
    transform: rotate(-18deg);
    z-index: 9;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .hero .paper-top::before {
    content: "";
    position: absolute;
    left: 11px;
    bottom: 14px;
    width: 89px;
    height: 5px;
    background: #83b7dd;
  }
  .hero .paper-top::after {
    content: "";
    position: absolute;
    right: 6px;
    top: 7px;
    width: 18px;
    height: 54px;
    background:
      repeating-linear-gradient(180deg, #5a94c4 0 6px, transparent 6px 10px);
    opacity: .55;
  }

  .hero .calculator {
    position: absolute;
    left: 264px;
    top: 175px;
    width: 71px;
    height: 94px;
    background: linear-gradient(180deg, #343840 0%, #20242b 100%);
    border-radius: 12px;
    transform: rotate(-24deg);
    z-index: 10;
    box-shadow: 0 2px 7px rgba(0,0,0,0.18);
  }
  .hero .calculator::before {
    content: "";
    position: absolute;
    left: 11px;
    top: 14px;
    width: 47px;
    height: 16px;
    border-radius: 3px;
    background: #5a5f68;
  }
  .hero .calculator::after {
    content: "";
    position: absolute;
    left: 13px;
    top: 40px;
    width: 45px;
    height: 39px;
    background:
      radial-gradient(circle at 6px 6px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 22px 6px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 38px 6px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 6px 19px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 22px 19px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 38px 19px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 6px 32px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 22px 32px, #727780 0 3px, transparent 3.4px),
      radial-gradient(circle at 38px 32px, #727780 0 3px, transparent 3.4px);
  }

  .hero .bars-left div,
  .hero .bars-top div {
    position: absolute;
    background: #4b93c4;
    z-index: 4;
  }
  .hero .bars-left .b1 { left: 0;   top: 283px; width: 9px;  height: 28px; }
  .hero .bars-left .b2 { left: 18px; top: 286px; width: 12px; height: 23px; }
  .hero .bars-left .b3 { left: 48px; top: 276px; width: 17px; height: 34px; }
  .hero .bars-left .b4 { left: 78px; top: 281px; width: 12px; height: 28px; }
  .hero .bars-left .b5 { left: 109px; top: 290px; width: 8px;  height: 18px; }

  .hero .bars-top .t1 { left: 188px; top: 232px; width: 6px; height: 9px; }
  .hero .bars-top .t2 { left: 198px; top: 227px; width: 6px; height: 14px; }
  .hero .bars-top .t3 { left: 209px; top: 224px; width: 6px; height: 17px; }
  .hero .bars-top .t4 { left: 219px; top: 220px; width: 6px; height: 21px; }
  .hero .bars-top .t5 { left: 230px; top: 229px; width: 6px; height: 12px; }
  .hero .bars-top .t6 { left: 240px; top: 231px; width: 6px; height: 10px; }
  .hero .bars-top .t7 { left: 250px; top: 235px; width: 6px; height: 6px; }
  .hero .bars-top .t8 { left: 260px; top: 228px; width: 6px; height: 13px; }

  .hero .hand-palm {
    position: absolute;
    left: 44px;
    top: 142px;
    width: 170px;
    height: 105px;
    background: linear-gradient(180deg, #f1d3bc 0%, #efceb5 58%, #e6bea2 100%);
    border-radius: 58px 76px 48px 56px;
    transform: rotate(18deg);
    z-index: 11;
    box-shadow: inset -6px -7px 10px rgba(180,120,90,.12);
  }

  .hero .finger {
    position: absolute;
    background: linear-gradient(180deg, #f1d4be 0%, #e7c1a6 100%);
    border-radius: 15px;
    z-index: 12;
    box-shadow: inset -2px -2px 3px rgba(170,120,90,.1);
  }
  .hero .f1 { left: 95px;  top: 145px; width: 27px; height: 103px; transform: rotate(35deg); }
  .hero .f2 { left: 125px; top: 155px; width: 24px; height: 96px;  transform: rotate(33deg); }
  .hero .f3 { left: 153px; top: 171px; width: 22px; height: 84px;  transform: rotate(30deg); }
  .hero .f4 { left: 179px; top: 191px; width: 18px; height: 61px;  transform: rotate(27deg); }

  .hero .nail {
    position: absolute;
    background: #c68f7f;
    border-radius: 6px;
    z-index: 13;
    opacity: .95;
  }
  .hero .n1 { left: 112px; top: 225px; width: 12px; height: 10px; transform: rotate(35deg); }
  .hero .n2 { left: 139px; top: 232px; width: 11px; height: 9px; transform: rotate(33deg); }
  .hero .n3 { left: 165px; top: 242px; width: 10px; height: 8px; transform: rotate(30deg); }
  .hero .n4 { left: 188px; top: 247px; width: 9px; height: 7px; transform: rotate(27deg); }

  .hero .pen {
    position: absolute;
    left: 148px;
    top: 178px;
    width: 6px;
    height: 117px;
    background: linear-gradient(180deg, #6f7885 0%, #a8b0bb 55%, #6f7885 100%);
    border-radius: 3px;
    transform: rotate(36deg);
    z-index: 14;
  }
  .hero .pen::before {
    content: "";
    position: absolute;
    left: 1px;
    top: -7px;
    width: 4px;
    height: 10px;
    background: #666e79;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  }

  .hero .pie {
    position: absolute;
    left: 35px;
    top: 333px;
    width: 104px;
    height: 76px;
    z-index: 4;
    opacity: .98;
  }
  .hero .blue-slab {
    position: absolute;
    left: 212px;
    top: 323px;
    width: 84px;
    height: 96px;
    background:
      repeating-linear-gradient(60deg, #28a2e6 0 4px, #86c7ef 4px 8px);
    clip-path: polygon(11% 9%, 100% 0%, 83% 95%, 0% 79%);
    z-index: 4;
  }

  .rb-logo {
    position: absolute;
    right: 34px;
    top: 23px;
    width: 151px;
    height: 54px;
    z-index: 10;
  }
  .rb-text {
    position: absolute;
    left: 0;
    top: 0;
    width: 101px;
    height: 54px;
    color: #1b1b1b;
  }
  .rb-text .roland {
    position: absolute;
    right: 0;
    top: 0;
    font-size: 12px;
    line-height: 12px;
    color: #3a3a3a;
    font-weight: 400;
  }
  .rb-text .berger {
    position: absolute;
    left: 0;
    top: 13px;
    font-size: 26px;
    line-height: 27px;
    font-weight: 400;
    letter-spacing: -0.03em;
    color: #1d1d1d;
  }
  .rb-mark {
    position: absolute;
    right: 0;
    top: 0;
    width: 42px;
    height: 52px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="bottom-band"></div>

    <div class="title-block">
      <div class="title-a">A.</div>
      <div class="title-text">Focus of study and<br>methodology</div>
    </div>

    <div class="hero">
      <div class="soft-col1"></div>
      <div class="soft-col2"></div>
      <div class="soft-col3"></div>

      <div class="top-arm"></div>
      <div class="paper-main"></div>
      <div class="paper-top"></div>
      <div class="calculator"></div>

      <div class="bars-left">
        <div class="b1"></div>
        <div class="b2"></div>
        <div class="b3"></div>
        <div class="b4"></div>
        <div class="b5"></div>
      </div>

      <div class="bars-top">
        <div class="t1"></div>
        <div class="t2"></div>
        <div class="t3"></div>
        <div class="t4"></div>
        <div class="t5"></div>
        <div class="t6"></div>
        <div class="t7"></div>
        <div class="t8"></div>
      </div>

      <div class="hand-palm"></div>
      <div class="finger f1"></div>
      <div class="finger f2"></div>
      <div class="finger f3"></div>
      <div class="finger f4"></div>

      <div class="nail n1"></div>
      <div class="nail n2"></div>
      <div class="nail n3"></div>
      <div class="nail n4"></div>

      <div class="pen"></div>

      <div class="pie">
        <svg viewBox="0 0 104 76" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="52" cy="39" rx="33" ry="19" fill="#4b93c4"/>
          <path d="M52 39 L77 20 A33 19 0 0 1 67 55 Z" fill="#dfe6ef"/>
          <path d="M52 39 L36 24 A33 19 0 0 0 20 40 Z" fill="#eef2f7"/>
          <ellipse cx="52" cy="40" rx="33" ry="19" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
        </svg>
      </div>

      <div class="blue-slab"></div>
    </div>

    <div class="rb-logo">
      <div class="rb-text">
        <div class="roland">Roland</div>
        <div class="berger">Berger</div>
      </div>
      <div class="rb-mark">
        <svg viewBox="0 0 42 52" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#dde0e3"/>
              <stop offset="52%" stop-color="#9ca3aa"/>
              <stop offset="100%" stop-color="#646b72"/>
            </linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#b8bec4"/>
              <stop offset="100%" stop-color="#6d747b"/>
            </linearGradient>
          </defs>
          <path d="M4 1 L18 1 C31 1 39 9 39 20 C39 28 35 34 27 36 C36 37 42 44 42 52 L4 52 Z" fill="url(#g1)"/>
          <path d="M4 1 L14 1 C22 1 27 6 27 14 C27 21 23 26 16 28 C24 29 30 34 30 41 C30 47 27 50 24 52 L4 52 Z" fill="url(#g2)" opacity="0.42"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
