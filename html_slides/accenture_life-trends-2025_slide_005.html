<!DOCTYPE html>

<style>

    background: #fefefe;

  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f7f7f7;
    color: #3f3f3f;
  }

  .title {
    position: absolute;
    left: 161px;
    top: 116px;
    font-size: 38px;
    line-height: 1;
    font-weight: 300;
    color: #7d1fd1;
    letter-spacing: 0.2px;
  }

    position: absolute;
    width: 214px;
  }
  .t1 { left: 161px; top: 221px; }
  .t2 { left: 403px; top: 221px; }
  .t3 { left: 645px; top: 221px; }
  .t4 { left: 888px; top: 221px; }
