<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>Roland Berger Slide Replica</title>
<style>
  html, body {
    margin: 0;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #ffffff;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f3f3f3;
  }

  .logo-wrap {
    position: absolute;
    left: 322px;
    top: 235px;
    width: 610px;
    height: 245px;
  }

  .roland {
    position: absolute;
    left: 176px;
    top: 2px;
    font-size: 56px;
    line-height: 1;
    font-weight: 400;
    color: #000000;
    letter-spacing: -1.5px;
    white-space: nowrap;
  }

  .berger {
    position: absolute;
    left: 0;
    top: 40px;
    font-size: 117px;
    line-height: 1;
    font-weight: 400;
    color: #000000;
    letter-spacing: -5px;
    white-space: nowrap;
  }

  .thinkact {
    position: absolute;
    left: 135px;
    top: 176px;
    font-size: 45px;
    line-height: 1;
    font-weight: 700;
    color: #7f878e;
    letter-spacing: 0;
    white-space: nowrap;
  }

  .bmark {
    position: absolute;
    left: 406px;
    top: 0;
    width: 210px;
    height: 256px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
  }

  .b-rect {
    position: absolute;
    left: 0;
    top: 0;
    width: 104px;
    height: 256px;
    background: linear-gradient(
      90deg,
      #8f99a1 0%,
      #b7bfc5 16%,
      #e8ecef 31%,
      #f4f6f7 37%,
      #d5dbe0 46%,
      #b4bcc3 58%,
      #909aa2 74%,
      #778189 100%
    );
    border-radius: 2px 0 0 2px;
  }

  .b-top,
  .b-bottom {
    position: absolute;
    left: 64px;
    width: 146px;
    height: 138px;
    background: linear-gradient(
      90deg,
      #8e98a0 0%,
      #b6bec4 16%,
      #e8ecef 31%,
      #f6f7f8 37%,
      #d4dae0 46%,
      #b2bac1 58%,
      #8f99a1 74%,
      #767f87 100%
    );
    border-top-right-radius: 69px;
    border-bottom-right-radius: 69px;
  }

  .b-top {
    top: 0;
  }

  .b-bottom {
    top: 118px;
    background: linear-gradient(
      90deg,
      #8b959d 0%,
      #b3bbc1 16%,
      #e5e9ec 31%,
      #f2f4f5 37%,
      #d0d7dc 46%,
      #afb7be 58%,
      #8b959d 74%,
      #737d85 100%
    );
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="logo-wrap">
      <div class="roland">Roland</div>
      <div class="berger">Berger</div>
      <div class="thinkact">THINK:ACT</div>
      <div class="bmark">
        <div class="b-rect"></div>
        <div class="b-top"></div>
        <div class="b-bottom"></div>
      </div>
    </div>
  </div>
</body>
</html>
