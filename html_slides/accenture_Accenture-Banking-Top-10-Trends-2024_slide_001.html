<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Banking on AI</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #dcdcdc;
    font-family: Arial, Helvetica, sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    margin: 0 auto;
    background:
      radial-gradient(75% 90% at 86% 28%, rgba(255,255,255,0.97) 0%, rgba(244,245,230,0.92) 10%, rgba(255,186,228,0.85) 18%, rgba(233,34,238,0.78) 28%, rgba(110,0,227,0.72) 44%, rgba(20,8,84,0.55) 60%, rgba(0,0,0,0) 68%),
      radial-gradient(55% 65% at 74% 70%, rgba(255,47,241,0.85) 0%, rgba(196,0,255,0.74) 24%, rgba(72,15,203,0.62) 46%, rgba(20,4,70,0.32) 63%, rgba(0,0,0,0) 72%),
      radial-gradient(48% 42% at 18% 61%, rgba(243,128,201,0.92) 0%, rgba(168,31,214,0.82) 22%, rgba(78,4,118,0.52) 48%, rgba(0,0,0,0) 65%),
      linear-gradient(180deg, #05030b 0%, #07030d 35%, #0b0411 100%);
  }

  .frame {
    position: absolute;
    left: 0;
    top: 0;
    width: 1280px;
    height: 720px;
    box-sizing: border-box;
    border: 30px solid #dcdcdc;
    pointer-events: none;
  }

  .title {
    position: absolute;
    left: 132px;
    top: 128px;
    margin: 0;
    color: #f4f4f4;
    font-size: 93px;
    line-height: 0.98;
    font-weight: 700;
    letter-spacing: -3px;
  }

  .subtitle {
    position: absolute;
    left: 132px;
    top: 244px;
    margin: 0;
    color: rgba(255,255,255,0.82);
    font-size: 28px;
    line-height: 1.2;
    font-weight: 300;
    letter-spacing: -0.3px;
  }

  .orb-right {
    position: absolute;
    right: -86px;
    top: 42px;
    width: 620px;
    height: 430px;
    border-radius: 50%;
    background:
      radial-gradient(52% 46% at 34% 54%, rgba(237,248,235,0.98) 0%, rgba(247,238,224,0.95) 18%, rgba(255,179,226,0.88) 30%, rgba(247,55,238,0.84) 43%, rgba(128,0,241,0.72) 60%, rgba(33,44,197,0.62) 72%, rgba(0,0,0,0) 79%);
    filter: blur(1.5px);
    transform: rotate(-16deg);
    opacity: 0.95;
  }

  .orb-right::before {
    content: "";
    position: absolute;
    left: 56px;
    top: 74px;
    width: 520px;
    height: 270px;
    border-radius: 50%;
    background:
      conic-gradient(from 230deg,
        rgba(255,255,255,0) 0deg 35deg,
        rgba(255,255,255,0.62) 35deg 78deg,
        rgba(255,117,234,0.74) 78deg 126deg,
        rgba(230,46,255,0.68) 126deg 192deg,
        rgba(100,0,255,0.45) 192deg 248deg,
        rgba(255,255,255,0.12) 248deg 300deg,
        rgba(255,255,255,0) 300deg 360deg);
    mix-blend-mode: screen;
    filter: blur(6px);
    transform: rotate(14deg);
  }

  .orb-left {
    position: absolute;
    left: -78px;
    top: 325px;
    width: 520px;
    height: 250px;
    border-radius: 50%;
    background:
      radial-gradient(68% 60% at 62% 46%, rgba(255,187,213,0.96) 0%, rgba(232,108,206,0.9) 18%, rgba(177,39,216,0.84) 38%, rgba(92,10,160,0.7) 60%, rgba(0,0,0,0) 76%);
    transform: rotate(-8deg);
    filter: blur(1px);
    opacity: 0.9;
  }

  .flow {
    position: absolute;
    left: 280px;
    top: 452px;
    width: 740px;
    height: 230px;
    border-radius: 50%;
    background:
      radial-gradient(65% 70% at 42% 62%, rgba(190,68,83,0.62) 0%, rgba(159,38,72,0.48) 24%, rgba(135,15,108,0.38) 42%, rgba(60,14,122,0.2) 58%, rgba(0,0,0,0) 74%);
    transform: rotate(-18deg);
    filter: blur(4px);
  }

  .light-streak {
    position: absolute;
    left: 596px;
    top: 446px;
    width: 340px;
    height: 88px;
    border-top: 4px solid rgba(255,210,241,0.55);
    border-radius: 50%;
    transform: rotate(18deg);
    filter: blur(0.5px);
    opacity: 0.9;
  }

  .light-streak::after {
    content: "";
    position: absolute;
    left: -38px;
    top: 40px;
    width: 390px;
    height: 66px;
    border-top: 3px solid rgba(255,210,241,0.25);
    border-radius: 50%;
    transform: rotate(-6deg);
  }

  .logo {
    position: absolute;
    right: 80px;
    bottom: 52px;
    color: #ffffff;
    font-size: 38px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -1.2px;
  }

  .logo .mark {
    position: absolute;
    right: 70px;
    top: -32px;
    color: #a309d9;
    font-size: 56px;
    line-height: 1;
    font-weight: 700;
    transform: scaleX(0.9);
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="orb-right"></div>
    <div class="orb-left"></div>
    <div class="flow"></div>
    <div class="light-streak"></div>

    <h1 class="title">Banking on AI</h1>
    <p class="subtitle">Banking Top 10 Trends for 2024</p>

    <div class="logo">
      <span class="mark">&gt;</span>
      accenture
    </div>

    <div class="frame"></div>
  </div>
</body>
</html>
