<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Agenda Slide</title>
<style>
  body {
    margin: 0;
    background: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: linear-gradient(90deg, #f2f2f2 0 53.5%, #1b0820 53.5% 100%);
  }

  .left-panel {
    position: absolute;
    left: 0;
    top: 0;
    width: 685px;
    height: 720px;
    background: #f2f2f2;
  }

  .title {
    position: absolute;
    left: 50px;
    top: 141px;
    font-size: 28px;
    line-height: 1;
    color: #b3201d;
    font-weight: 700;
  }

  .rule {
    position: absolute;
    left: 50px;
    top: 194px;
    width: 613px;
    height: 10px;
    background: #b3201d;
  }

  .agenda {
    position: absolute;
    left: 50px;
    top: 214px;
    width: 500px;
    color: #111;
  }

  .item {
    position: absolute;
    left: 0;
    width: 500px;
    height: 44px;
    font-size: 24px;
    line-height: 44px;
    color: #111;
    font-weight: 400;
  }

  .item .num {
    display: inline-block;
    width: 40px;
    color: #b3201d;
    font-weight: 400;
  }

  .item.bold {
    font-weight: 700;
  }

  .item1 { top: 0; }
  .item2 { top: 44px; }
  .item3 { top: 88px; }
  .item4 { top: 132px; }

  .footer {
    position: absolute;
    left: 50px;
    top: 714px;
    transform: translateY(-100%);
    font-size: 14px;
    line-height: 18px;
    color: #222;
  }

  .photo-area {
    position: absolute;
    left: 685px;
    top: 0;
    width: 595px;
    height: 720px;
    background:
      radial-gradient(120px 120px at 90% 44%, rgba(205,120,130,0.55), rgba(205,120,130,0) 70%),
      radial-gradient(170px 220px at 70% 28%, rgba(240,160,160,0.28), rgba(240,160,160,0) 72%),
      radial-gradient(200px 220px at 20% 62%, rgba(0,0,0,0.75), rgba(0,0,0,0) 72%),
      linear-gradient(140deg, #f0d9d7 0%, #2a1c33 10%, #120418 35%, #260522 58%, #090313 100%);
  }

  .car-line1, .car-line2, .car-line3 {
    position: absolute;
    background: rgba(120,170,210,0.5);
    filter: blur(1px);
  }
  .car-line1 {
    left: 696px;
    top: 10px;
    width: 280px;
    height: 9px;
    transform: rotate(24deg);
  }
  .car-line2 {
    left: 707px;
    top: 51px;
    width: 155px;
    height: 8px;
    background: rgba(220,235,240,0.7);
    transform: rotate(53deg);
    box-shadow: 0 0 18px rgba(255,230,230,0.7);
  }
  .car-line3 {
    left: 1190px;
    top: 680px;
    width: 120px;
    height: 6px;
    transform: rotate(-13deg);
    background: rgba(120,170,210,0.55);
  }

  .car-door {
    position: absolute;
    left: 690px;
    top: 300px;
    width: 210px;
    height: 420px;
    border-left: 10px solid rgba(70,95,120,0.35);
    border-top-left-radius: 160px 80px;
    background: linear-gradient(180deg, rgba(20,15,30,0.0), rgba(0,0,0,0.45));
  }
  .car-pocket {
    position: absolute;
    left: 815px;
    top: 334px;
    width: 117px;
    height: 210px;
    border: 6px solid rgba(160,190,220,0.28);
    border-right: none;
    border-radius: 82px 0 0 82px;
    opacity: 0.45;
  }

  .hand1, .hand2, .finger {
    position: absolute;
    background: radial-gradient(circle at 35% 35%, #e0a1a3 0%, #c77b82 45%, #8c4f5a 100%);
  }
  .hand1 {
    left: 1110px;
    top: 205px;
    width: 213px;
    height: 356px;
    border-radius: 110px;
    transform: rotate(24deg);
    box-shadow: inset -12px -18px 30px rgba(80,30,40,0.35);
  }
  .hand2 {
    left: 911px;
    top: 540px;
    width: 158px;
    height: 212px;
    border-radius: 90px;
    transform: rotate(22deg);
    box-shadow: inset -10px -14px 22px rgba(80,30,40,0.35);
  }
  .finger {
    left: 1052px;
    top: 551px;
    width: 66px;
    height: 108px;
    border-radius: 34px;
    transform: rotate(-10deg);
    box-shadow: inset -8px -10px 16px rgba(80,30,40,0.35);
  }

  .phone {
    position: absolute;
    left: 815px;
    top: 83px;
    width: 224px;
    height: 493px;
    background: #0b1118;
    border-radius: 26px;
    transform: rotate(-27deg);
    box-shadow: 0 0 0 3px rgba(10,10,10,0.75), 0 10px 28px rgba(0,0,0,0.45);
  }
  .phone:before {
    content: "";
    position: absolute;
    left: 82px;
    top: 8px;
    width: 58px;
    height: 8px;
    background: #131a21;
    border-radius: 4px;
  }

  .screen {
    position: absolute;
    left: 12px;
    top: 18px;
    width: 200px;
    height: 462px;
    background: #1f607f;
    border-radius: 18px;
    border: 2px solid #1ec6ff;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(60,220,255,0.35);
  }

  .tag {
    position: absolute;
    height: 15px;
    padding: 1px 7px 0 7px;
    font-size: 8px;
    line-height: 14px;
    color: #39dbff;
    border: 1px solid rgba(57,219,255,0.45);
    background: rgba(57,219,255,0.08);
    border-radius: 2px;
  }
  .tag1 { left: 18px; top: 25px; }
  .tag2 { left: 76px; top: 24px; }
  .tag3 { left: 133px; top: 18px; }

  .charging {
    position: absolute;
    left: 51px;
    top: 59px;
    font-size: 16px;
    color: #1fe0ff;
    letter-spacing: 0.2px;
  }
  .pct {
    position: absolute;
    right: 25px;
    top: 53px;
    font-size: 18px;
    color: #24e8ff;
  }

  .battery {
    position: absolute;
    left: 74px;
    top: 99px;
    width: 73px;
    height: 33px;
    border: 2px solid #2fd8ff;
    border-radius: 6px;
    box-sizing: border-box;
  }
  .battery:after {
    content: "";
    position: absolute;
    right: -7px;
    top: 9px;
    width: 5px;
    height: 11px;
    background: #2fd8ff;
    border-radius: 0 2px 2px 0;
  }
  .battery .bar {
    position: absolute;
    top: 4px;
    width: 10px;
    height: 21px;
    background: rgba(47,216,255,0.55);
    border-radius: 1px;
  }
  .b1 { left: 6px; }
  .b2 { left: 19px; }
  .b3 { left: 32px; }
  .b4 { left: 45px; }
  .b5 { left: 58px; }

  .car {
    position: absolute;
    left: 49px;
    top: 145px;
    width: 122px;
    height: 74px;
  }
  .car-body {
    position: absolute;
    left: 10px;
    top: 20px;
    width: 102px;
    height: 36px;
    background: rgba(47,216,255,0.35);
    border: 2px solid rgba(47,216,255,0.25);
    border-radius: 22px 28px 18px 18px;
  }
  .car-top {
    position: absolute;
    left: 33px;
    top: 9px;
    width: 67px;
    height: 22px;
    background: rgba(47,216,255,0.28);
    border: 2px solid rgba(47,216,255,0.25);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    transform: skewX(-20deg);
  }
  .wheel {
    position: absolute;
    bottom: 11px;
    width: 18px;
    height: 18px;
    background: #1f607f;
    border: 3px solid rgba(47,216,255,0.45);
    border-radius: 50%;
  }
  .w1 { left: 20px; }
  .w2 { right: 20px; }

  .bolt {
    position: absolute;
    left: 88px;
    top: 168px;
    font-size: 25px;
    color: #39e7ff;
    text-shadow: 0 0 8px rgba(57,231,255,0.65);
  }

  .divider {
    position: absolute;
    left: 37px;
    top: 243px;
    width: 129px;
    height: 2px;
    background: rgba(47,216,255,0.9);
  }

  .start-ring {
    position: absolute;
    left: 86px;
    top: 276px;
    width: 66px;
    height: 66px;
    border: 3px solid #2fe4ff;
    border-radius: 50%;
    box-shadow: 0 0 9px rgba(47,228,255,0.6), inset 0 0 9px rgba(47,228,255,0.25);
  }
  .start-ring:before,
  .start-ring:after {
    content: "";
    position: absolute;
    inset: -10px;
    border: 3px dashed rgba(47,228,255,0.6);
    border-radius: 50%;
  }
  .start-text {
    position: absolute;
    left: 95px;
    top: 300px;
    font-size: 16px;
    color: rgba(47,228,255,0.75);
    font-weight: 700;
  }

  .icon {
    position: absolute;
    width: 41px;
    height: 41px;
    border: 3px solid #2fe4ff;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(47,228,255,0.6), inset 0 0 6px rgba(47,228,255,0.2);
    color: #2fe4ff;
    text-align: center;
    line-height: 37px;
    font-size: 22px;
    font-weight: 700;
  }
  .i1 { left: 86px; top: 381px; }
  .i2 { left: 130px; top: 367px; font-size: 18px; }
  .i3 { left: 166px; top: 347px; font-size: 16px; }

</style>
</head>
<body>
  <div class="slide">
    <div class="left-panel"></div>

    <div class="title">Agenda</div>
    <div class="rule"></div>

    <div class="agenda">
      <div class="item item1"><span class="num">1.</span>Executive Summary</div>
      <div class="item item2 bold"><span class="num">2.</span>Consumers viewpoint</div>
      <div class="item item3"><span class="num">3.</span>eReadiness Index</div>
      <div class="item item4"><span class="num">4.</span>Contacts</div>
    </div>

    <div class="footer">eReadiness Report 2024<br>Strategy&amp;</div>

    <div class="photo-area"></div>
    <div class="car-line1"></div>
    <div class="car-line2"></div>
    <div class="car-line3"></div>
    <div class="car-door"></div>
    <div class="car-pocket"></div>

    <div class="hand1"></div>
    <div class="hand2"></div>
    <div class="finger"></div>

    <div class="phone">
      <div class="screen">
        <div class="tag tag1">13.40</div>
        <div class="tag tag2">5.722</div>
        <div class="tag tag3">81%</div>

        <div class="charging">Charging...</div>
        <div class="pct">81%</div>

        <div class="battery">
          <div class="bar b1"></div>
          <div class="bar b2"></div>
          <div class="bar b3"></div>
          <div class="bar b4"></div>
          <div class="bar b5"></div>
        </div>

        <div class="car">
          <div class="car-top"></div>
          <div class="car-body"></div>
          <div class="wheel w1"></div>
          <div class="wheel w2"></div>
        </div>

        <div class="bolt">⚡</div>
        <div class="divider"></div>

        <div class="start-ring"></div>
        <div class="start-text">START</div>

        <div class="icon i1">⚡</div>
        <div class="icon i2">⌖</div>
        <div class="icon i3">EV</div>
      </div>
    </div>
  </div>
</body>
</html>
