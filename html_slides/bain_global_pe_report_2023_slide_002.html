<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Bain Slide Replica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #dedede;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    background: #dedede;
    overflow: hidden;
  }

  .photo {
    position: absolute;
    left: 38px;
    top: 33px;
    width: 902px;
    height: 705px;
    overflow: hidden;
    z-index: 1;
    background:
      linear-gradient(180deg, rgba(15,20,28,0.32) 0%, rgba(15,20,28,0.12) 18%, rgba(10,14,20,0.20) 100%),
      linear-gradient(180deg, #1a2430 0%, #2d3b4f 10%, #514c5c 18%, #8f7a75 28%, #7a7e86 34%, #526784 44%, #39577a 54%, #2b4663 61%, #2b3d57 67%, #53637f 73%, #7e94b3 79%, #52647f 86%, #121c2e 100%);
  }
  .photo svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .title1, .title2 {
    position: absolute;
    left: 66px;
    color: #f2f2ef;
    z-index: 5;
    letter-spacing: 0;
    font-weight: 300;
    line-height: 1.04;
  }
  .title1 {
    top: 79px;
    font-size: 58px;
    white-space: nowrap;
  }
  .title2 {
    top: 142px;
    font-size: 58px;
    white-space: nowrap;
  }
  .title1 .bold {
    font-weight: 700;
  }

  .panel {
    position: absolute;
    left: 131px;
    top: 394px;
    width: 1139px;
    height: 269px;
    background: #000;
    z-index: 10;
  }

  .divider {
    position: absolute;
    top: 417px;
    width: 1px;
    height: 228px;
    background: rgba(150,150,150,0.9);
    z-index: 15;
  }
  .divider.d1 { left: 518px; }
  .divider.d2 { left: 919px; }

  .col {
    position: absolute;
    color: #f4f4f4;
    font-size: 28px;
    line-height: 1.21;
    font-weight: 300;
    z-index: 20;
  }
  .col .b { font-weight: 700; }

  .col1 {
    left: 163px;
    top: 437px;
    width: 286px;
  }
  .col2 {
    left: 582px;
    top: 437px;
    width: 277px;
  }
  .col3 {
    left: 960px;
    top: 437px;
    width: 276px;
  }
</style>
</head>

      <defs>
        <linearGradient id="skyGlow" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e1c4a1" stop-opacity="0.28"/>
          <stop offset="45%" stop-color="#e3b1a3" stop-opacity="0.10"/>
          <stop offset="76%" stop-color="#b97aa0" stop-opacity="0.14"/>
          <stop offset="100%" stop-color="#5670aa" stop-opacity="0.14"/>

      <ellipse cx="387" cy="637" rx="3" ry="3" fill="rgba(255,180,90,0.62)"/>
    </svg>
  </div>

  <div class="title1">2022 was a <span class="bold">tale of two halves</span></div>
  <div class="title2">in private equity industry</div>

  <div class="panel"></div>
  <div class="divider d1"></div>
  <div class="divider d2"></div>

  <div class="col col1">
    <span class="b">Deals and exits</span><br>
    slowed down<br>
    substantially in the<br>
    second half of 2022
  </div>

  <div class="col col2">
    Average deal size fell<br>
    by <span class="b">over 20%</span>, as<br>
    banks pulled back on<br>
    large buyout lending
  </div>

  <div class="col col3">
    With <span class="b">LPs squeezed</span><br>
    <span class="b">for cash</span>, the biggest,<br>
    <span class="b">most experienced</span><br>

    most money
