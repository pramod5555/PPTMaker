<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Roland Berger Trend Compendium 2030</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  #slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f2f2f2;
  }
  .abs { position: absolute; }

  .title {
    left: 46px;
    top: 262px;
    width: 320px;
    font-size: 48px;
    line-height: 1.02;
    font-weight: 400;
    color: #000000;
    letter-spacing: -0.02em;
  }

  .subtitle {
    left: 46px;
    top: 510px;
    width: 350px;
    font-size: 28px;
    line-height: 1.14;
    color: #166ea3;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .subtitle .bold { font-weight: 700; }

  .date {
    left: 46px;
    top: 675px;
    font-size: 17px;
    line-height: 1.2;
    color: #111111;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .logo-wrap {
    position: absolute;
    right: 34px;
    top: 24px;
    width: 110px;
    height: 54px;
  }
  .logo-text {
    position: absolute;
    right: 42px;
    top: 0;
    width: 68px;
    color: #2f2f2f;
    text-align: right;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .logo-text .roland {
    display: block;
    font-size: 16px;
    line-height: 1;
    margin-bottom: -1px;
  }
  .logo-text .berger {
    display: block;
    font-size: 23px;
    line-height: 0.95;
  }
  .logo-mark {
    position: absolute;
    right: 0;
    top: 0;
    width: 36px;
    height: 50px;
    background: linear-gradient(90deg, #d9d9d9 0%, #a8a8a8 45%, #666666 100%);
    border-top-left-radius: 3px;
    border-bottom-left-radius: 3px;
    clip-path: polygon(
      0 0,
      40% 0,
      62% 0,
      78% 7%,
      89% 18%,
      89% 34%,
      84% 45%,
      73% 52%,
      87% 59%,
      100% 72%,
      100% 100%,
      0 100%
    );
  }

  .artboard {
    position: absolute;
    left: 478px;
    top: 49px;
    width: 478px;
    height: 564px;
  }
  .artboard svg {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
  <div id="slide">
    <div class="abs title">Roland Berger<br>Trend<br>Compendium<br>2030</div>

    <div class="abs subtitle"><span class="bold">Megatrend 5</span><br>Dynamic technology &amp;<br>innovation</div>

    <div class="abs date">October 2017</div>

    <div class="logo-wrap">
      <div class="logo-text">
        <span class="roland">Roland</span>
        <span class="berger">Berger</span>
      </div>
      <div class="logo-mark"></div>
    </div>

    <div class="artboard">
      <svg viewBox="0 0 478 564" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="gTop" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#12a9e8"/>
            <stop offset="100%" stop-color="#097bc7"/>
          </linearGradient>
          <linearGradient id="gBottom" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#1896ee"/>
            <stop offset="100%" stop-color="#05d7e2"/>
          </linearGradient>
          <linearGradient id="gTall" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#2aa8e9" stop-opacity="0.92"/>
            <stop offset="100%" stop-color="#1cc5e1" stop-opacity="0.92"/>
          </linearGradient>
          <linearGradient id="gMid" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#2c9fe3" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#2bc4e4" stop-opacity="0.9"/>
          </linearGradient>
        </defs>

        <!-- base top -->
        <path d="M0,71 H179
                 A131,131 0 0 1 179,333
                 H0 Z"
              fill="url(#gTop)"/>

        <!-- top darker square extension -->
        <rect x="0" y="71" width="182" height="133" fill="#0a79c3" opacity="0.72"/>

        <!-- bottom base -->
        <path d="M0,314 H230
                 A145,145 0 0 1 230,604
                 H0 Z"
              transform="translate(0,-1)"
              fill="url(#gBottom)"/>

        <!-- decorative diagonal bars -->
        <g opacity="0.42" fill="#29d8ec">
          <rect x="19" y="87" width="54" height="138" transform="rotate(29 46 156)"/>
          <rect x="32" y="132" width="55" height="220" transform="rotate(29 59 242)"/>
          <rect x="40" y="150" width="14" height="248" transform="rotate(29 47 274)"/>
          <rect x="58" y="285" width="92" height="245" transform="rotate(29 104 407)"/>
          <rect x="127" y="274" width="105" height="247" transform="rotate(29 179 397)"/>
          <rect x="207" y="245" width="92" height="306" transform="rotate(29 253 398)"/>
          <rect x="299" y="365" width="82" height="164" transform="rotate(29 340 447)"/>
          <rect x="395" y="488" width="28" height="84" transform="rotate(29 409 530)"/>
        </g>

        <g opacity="0.28" fill="#00c1e5">
          <rect x="7" y="166" width="80" height="126" transform="rotate(29 47 229)"/>
          <rect x="30" y="281" width="73" height="150" transform="rotate(29 66 356)"/>
          <rect x="112" y="275" width="90" height="145" transform="rotate(29 157 347)"/>
          <rect x="281" y="406" width="74" height="111" transform="rotate(29 318 462)"/>
          <rect x="378" y="500" width="20" height="56" transform="rotate(29 388 528)"/>
        </g>

        <!-- large tall diagonal block -->
        <rect x="173" y="-4" width="119" height="290" transform="rotate(29 232 141)" fill="url(#gTall)"/>

        <!-- notch cut -->
        <polygon points="244,313 303,287 274,338" fill="#f2f2f2"/>

        <!-- middle diagonal block -->
        <rect x="287" y="299" width="116" height="198" transform="rotate(29 345 398)" fill="url(#gMid)"/>
      </svg>
    </div>
  </div>
</body>
</html>
