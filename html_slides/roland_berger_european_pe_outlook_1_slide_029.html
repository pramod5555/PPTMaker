  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f5f5f5;
  }
  .slide > div,
  .slide > svg {

    top: 24px;
    width: 118px;
    height: 56px;
    z-index: 50;
  }
  .logo-text {
    position: absolute;
    left: 0;
    top: 6px;
    width: 77px;
    color: #1a1a1a;
    font-size: 20px;
    line-height: 19px;
    font-weight: 400;
    text-align: right;
    letter-spacing: -0.2px;
  }
  .logo-text .small {
    display: block;
    font-size: 11px;
    line-height: 10px;
    margin-bottom: 1px;
    font-weight: 400;
  }
  .logo-b {
    position: absolute;
    left: 82px;
    top: 0;
    width: 42px;
    height: 54px;
  }

  .title-block {
    left: 47px;
    top: 384px;
    width: 420px;
    height: 150px;
    z-index: 30;
    color: #111;
  }
  .title-d {
    position: absolute;
    left: 0;
    top: 0;
    font-size: 28px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.2px;
  }
  .title-text {
    position: absolute;
    left: 68px;
    top: 0;
    width: 320px;
    font-size: 28px;
    line-height: 1.38;
    font-weight: 400;
    letter-spacing: -0.4px;
  }

  .figure {
    left: 514px;
    top: 181px;
    width: 390px;
    height: 414px;
    z-index: 20;
  }

  .mask-top {
    left: 0;
    top: 0;
    width: 305px;
    height: 212px;
    overflow: hidden;
    background: #ece9e6;
    border-top-left-radius: 0;
    border-top-right-radius: 96px;
    border-bottom-left-radius: 0;
