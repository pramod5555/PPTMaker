<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF External Sector Report 2025 – slide_003 – Title page</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #ffffff;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #1a1a1a;
  }
  .org-name {
    position: absolute; left: 80px; top: 40px;
    font-size: 18px; font-weight: 400; letter-spacing: 2px;
    text-transform: uppercase; color: #1a1a1a;
  }
  .main-title {
    position: absolute; left: 80px; top: 100px;
    font-size: 120px; font-weight: 900; line-height: 1.0;
    letter-spacing: -2px; color: #e8720c;
    text-transform: uppercase;
  }
  .subtitle {
    position: absolute; left: 80px; top: 490px;
    font-size: 30px; font-weight: 400; line-height: 1.3; color: #1a1a1a;
  }
  .year {
    position: absolute; left: 80px; bottom: 52px;
    font-size: 36px; font-weight: 900; color: #1a1a1a;
  }
  /* IMF seal — circular approximation */
  .seal {
    position: absolute; right: 80px; bottom: 36px;
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #1a1a1a;
    text-align: center; letter-spacing: 0.5px; line-height: 1.3;
    text-transform: uppercase;
  }
  .copyright {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; color: #777;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="org-name">International Monetary Fund</div>
  <div class="main-title">EXTERNAL<br>SECTOR<br>REPORT</div>
  <div class="subtitle">Global Imbalances<br>in a Shifting World</div>
  <div class="year">2025</div>
  <div class="seal">INTER-<br>NATIONAL<br>MONETARY<br>FUND</div>
  <div class="copyright">©International Monetary Fund. Not for Redistribution</div>
</div>
</body>
</html>
