<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>JPMorgan Private Markets Fund</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f1f1f1;
  }

  .top-area {
    position: absolute;
    left: 0;
    top: 0;
    width: 1280px;
    height: 385px;
    background: #f0f2f3;
    overflow: hidden;
  }

  .ground-shadow {
    position: absolute;
    left: 742px;
    top: 175px;
    width: 538px;
    height: 176px;
    background: linear-gradient(135deg, rgba(180,188,193,0.18) 0%, rgba(192,198,202,0.08) 45%, rgba(220,224,226,0.00) 100%);
    clip-path: polygon(0 0, 100% 66%, 100% 100%, 22% 24%);
    z-index: 1;
  }

  .left-top {
    position: absolute;
    left: -6px;
    top: -10px;
    width: 330px;
    height: 124px;
    background: linear-gradient(180deg, #9bd3d8 0%, #258eff 78%, #1972ef 100%);
    clip-path: polygon(0 0, 72% 0, 100% 92%, 0 96%);
    border-top-right-radius: 8px;
    z-index: 8;
  }

  .left-front {
    position: absolute;
    left: 0;
    top: 102px;
    width: 324px;
    height: 203px;
    background: linear-gradient(90deg, #2095ff 0%, #1492f4 52%, #84d8ec 100%);
    clip-path: polygon(0 0, 80% 0, 80% 100%, 0 100%);
    z-index: 9;
  }

  .left-front-curve {
    position: absolute;
    left: -18px;
    top: 118px;
    width: 344px;
    height: 182px;
    background: linear-gradient(90deg, #43bbff 0%, #1695f8 50%, #91dbe9 100%);
    clip-path: ellipse(82% 62% at 10% 14%);
    opacity: 0.95;
    z-index: 10;
  }

  .left-bottom {
    position: absolute;
    left: 0;
    top: 305px;
    width: 324px;
    height: 80px;
    background: linear-gradient(180deg, #1138c1 0%, #0a2286 100%);
    clip-path: polygon(0 0, 81% 0, 81% 100%, 0 100%);
    z-index: 8;
  }

  .mid-top {
    position: absolute;
    left: 236px;
    top: 66px;
    width: 412px;
    height: 98px;
    background: linear-gradient(180deg, #b8dce7 0%, #9dd0e9 55%, #82c5eb 100%);
    clip-path: polygon(18% 0, 100% 100%, 0 100%);
    z-index: 7;
  }

  .mid-front {
    position: absolute;
    left: 324px;
    top: 163px;
    width: 324px;
    height: 198px;
    background: linear-gradient(90deg, #1e4fe4 0%, #2b77ff 48%, #87d7ea 100%);
    clip-path: polygon(0 0, 60% 0, 60% 100%, 0 100%);
    z-index: 11;
  }

  .mid-front-curve {
    position: absolute;
    left: 324px;
    top: 150px;
    width: 324px;
    height: 210px;
    background: linear-gradient(90deg, #93d9e9 0%, #2a6cff 46%, #89d9ea 100%);
    clip-path: ellipse(94% 64% at 0% 12%);
    opacity: 0.96;
    z-index: 12;
  }

  .right-top {
    position: absolute;
    left: 484px;
    top: 46px;
    width: 390px;
    height: 80px;
    background: linear-gradient(90deg, #59c8f1 0%, #63bee8 58%, #6fbbe0 100%);
    clip-path: polygon(0 0, 100% 52%, 100% 100%, 10% 76%);
    z-index: 5;
  }

  .right-front-face {
    position: absolute;
    left: 851px;
    top: 87px;
    width: 22px;
    height: 69px;
    background: linear-gradient(180deg, #2d7fd2 0%, #1463c1 100%);
    clip-path: polygon(0 0, 100% 0, 100% 72%, 0 100%);
    z-index: 6;
  }

  .right-band-dark {
    position: absolute;
    left: 652px;
    top: 128px;
    width: 221px;
    height: 125px;
    background: linear-gradient(90deg, #0f5cc7 0%, #1547ad 100%);
    clip-path: ellipse(66% 46% at 52% 0%);
    z-index: 4;
  }

  .right-band-cyan {
    position: absolute;
    left: 650px;
    top: 156px;
    width: 223px;
    height: 156px;
    background: linear-gradient(90deg, #18d8ff 0%, #1593f4 52%, #1fdcff 100%);
    clip-path: ellipse(66% 48% at 52% 0%);
    z-index: 3;
  }

  .center-shadow {
    position: absolute;
    left: 414px;
    top: 299px;
    width: 272px;
    height: 82px;
    background: linear-gradient(135deg, rgba(61,157,227,0.28) 0%, rgba(112,191,234,0.10) 55%, rgba(180,210,224,0) 100%);
    clip-path: polygon(0 0, 52% 0, 100% 100%, 22% 100%);
    filter: blur(3px);
    z-index: 2;
  }

  .title-band {
    position: absolute;
    left: 30px;
    top: 402px;
    width: 1071px;
    height: 53px;
    background: #f0cd80;
    z-index: 20;
  }

  .title {
    position: absolute;
    left: 38px;
    top: 406px;
    font-size: 34px;
    line-height: 1;
    font-weight: 400;
    color: #000000;
    z-index: 21;
    white-space: nowrap;
  }

  .date {
    position: absolute;
    left: 39px;
    top: 479px;
    font-size: 16px;
    line-height: 1;
    font-weight: 700;
    color: #111111;
    z-index: 21;
    white-space: nowrap;
  }

  .logo {
    position: absolute;
    right: 34px;
    bottom: 27px;
    text-align: left;
    color: #111111;
    z-index: 30;
  }

  .logo-main {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 33px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.03em;
    margin: 0 0 8px 0;
  }

  .logo-sub {
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
    font-size: 12px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="top-area">
      <div class="ground-shadow"></div>
      <div class="center-shadow"></div>

      <div class="left-top"></div>
      <div class="left-front"></div>
      <div class="left-front-curve"></div>
      <div class="left-bottom"></div>

      <div class="mid-top"></div>
      <div class="mid-front"></div>
      <div class="mid-front-curve"></div>

      <div class="right-top"></div>
      <div class="right-front-face"></div>
      <div class="right-band-dark"></div>
      <div class="right-band-cyan"></div>
    </div>

    <div class="title-band"></div>
    <div class="title">JPMorgan Private Markets Fund (“JPMF”)</div>
    <div class="date">June 2026</div>

    <div class="logo">
      <div class="logo-main">J.P.Morgan</div>
      <div class="logo-sub">ASSET MANAGEMENT</div>
    </div>
  </div>
</body>
</html>
