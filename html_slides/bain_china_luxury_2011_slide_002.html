<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Agenda Slide Replica</title>
<style>
  body{
    margin:0;
    background:#ffffff;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide{
    position:relative;
    width:1280px;
    height:720px;
    overflow:hidden;
    background:#dddddd;
  }
  .slide > div,
  .slide > svg{
    position:absolute;
    box-sizing:border-box;
  }

  .left-photo{
    left:16px;
    top:17px;
    width:352px;
    height:735px;
    overflow:hidden;
    background:
      radial-gradient(circle at 28% 12%, rgba(255,255,255,0.28) 0, rgba(255,255,255,0.06) 10%, rgba(0,0,0,0) 24%),
      radial-gradient(circle at 76% 9%, rgba(255,255,255,0.14) 0, rgba(0,0,0,0) 28%),
      radial-gradient(circle at 16% 94%, rgba(255,255,255,0.18) 0, rgba(0,0,0,0) 20%),
      linear-gradient(90deg, #7f7f7f 0%, #646464 15%, #555555 32%, #2d2d2d 58%, #525252 100%);
    filter: grayscale(100%);
  }
  .left-photo:before{
    content:"";
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0 1px, rgba(0,0,0,0) 1px 185px),
      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.08));
    opacity:.95;
    z-index:3;
  }
  .left-photo:after{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 22% 25%, rgba(255,255,255,.55) 0 6%, rgba(0,0,0,0) 7%),
      radial-gradient(circle at 31% 28%, rgba(255,255,255,.28) 0 8%, rgba(0,0,0,0) 9%),
      radial-gradient(circle at 27% 34%, rgba(255,255,255,.42) 0 12%, rgba(0,0,0,0) 13%),
      radial-gradient(circle at 41% 39%, rgba(255,255,255,.25) 0 10%, rgba(0,0,0,0) 11%),
      radial-gradient(circle at 16% 49%, rgba(255,255,255,.28) 0 10%, rgba(0,0,0,0) 11%),
      radial-gradient(circle at 53% 45%, rgba(255,255,255,.33) 0 8%, rgba(0,0,0,0) 9%),
      radial-gradient(circle at 25% 68%, rgba(255,255,255,.38) 0 12%, rgba(0,0,0,0) 13%),
      radial-gradient(circle at 63% 58%, rgba(255,255,255,.22) 0 10%, rgba(0,0,0,0) 11%),
      radial-gradient(circle at 48% 79%, rgba(255,255,255,.35) 0 10%, rgba(0,0,0,0) 11%);
    opacity:.45;
    z-index:2;
  }

  .title{
    left:376px;
    top:48px;
    font-size:34px;
    line-height:1;
    font-weight:400;
    color:#111111;
    letter-spacing:0;
    z-index:20;
  }

  .red-rule{
    left:337px;
    top:113px;
    width:701px;
    height:13px;
    background:#e10600;
    clip-path:polygon(0 0, 100% 0, 99.15% 100%, 0 100%);
    z-index:10;
  }

  .agenda-box{
    left:357px;
    top:217px;
    width:687px;
    height:67px;
    border:3px solid #d01010;
    background:transparent;
    z-index:10;
  }

  .bullet{
    color:#000000;
    font-size:33px;
    line-height:1;
    font-weight:400;
    z-index:20;
  }

  .item{
    color:#111111;
    font-size:33px;
    line-height:1.1;
    font-weight:400;
    white-space:nowrap;
    z-index:20;
  }

  .bullet1{ left:381px; top:241px; }
  .text1{ left:410px; top:234px; }

  .footer-text{

    line-height:1;

    font-weight:400;
    white-space:nowrap;

</style>
