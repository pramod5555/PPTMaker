<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Roland Berger Contact Slide</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }
  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    margin: 0 auto;
    overflow: hidden;
    background: #f3f3f3;
  }
  .slide * {
    position: absolute;
    box-sizing: border-box;
  }

  .title-block {
    left: 46px;
    top: 400px;
    width: 350px;
    height: 118px;
    color: #111;
    font-weight: 400;
  }
  .title-f {
    left: 0;
    top: 0;
    font-size: 40px;
    line-height: 40px;
    letter-spacing: -0.03em;
  }
  .title-text {
    left: 68px;
    top: 0;
    width: 282px;
    font-size: 39px;
    line-height: 1.02;
    letter-spacing: -0.04em;
  }

  .hero {
    left: 518px;
    top: 178px;
    width: 338px;
    height: 416px;
    overflow: visible;
  }
  .hero-top {
    left: 0;
    top: 0;
    width: 274px;
    height: 204px;
    border-top-right-radius: 112px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 68% 20%, rgba(122,145,182,0.42) 0%, rgba(122,145,182,0.12) 30%, rgba(0,0,0,0) 48%),
      linear-gradient(104deg, #08111f 0%, #0b1830 24%, #162640 42%, #0b1224 61%, #17253e 74%, #d7d0cf 100%);
  }
  .hero-top::before {
    content: "";
    position: absolute;
    left: 15px;
    top: -6px;
    width: 86px;
    height: 250px;
    background: linear-gradient(180deg, rgba(8,10,17,1) 0%, rgba(9,18,36,0.98) 100%);
    transform: skew(-3deg);
    opacity: 0.98;
  }
  .hero-top::after {
    content: "";
    position: absolute;
    left: 112px;
    top: -8px;
    width: 44px;
    height: 238px;
    background:
      linear-gradient(180deg, rgba(166,184,212,0.28) 0%, rgba(92,113,147,0.56) 20%, rgba(182,198,220,0.28) 39%, rgba(63,78,108,0.82) 100%);
    transform: skew(-8deg);
    box-shadow:
      28px 0 0 rgba(11,18,36,0.92),
      57px 0 0 rgba(8,14,29,0.96);
  }

  .arm {
    left: 189px;
    top: 94px;
    width: 95px;
    height: 69px;
    background: linear-gradient(135deg, #f0cdc0 0%, #e7c0b1 56%, #d7aa98 100%);
    border-radius: 34px 0 22px 36px;
    transform: rotate(-10deg);
    z-index: 5;
    box-shadow: inset -4px -4px 7px rgba(170,120,100,0.18);
  }
  .finger {
    left: 226px;
    top: 112px;
    width: 24px;
    height: 84px;
    background: linear-gradient(180deg, #f5d8cb 0%, #e8c0b0 100%);
    border-radius: 14px;
    transform: rotate(8deg);
    z-index: 6;
    box-shadow: inset -2px -2px 5px rgba(165,110,90,0.16);
  }
  .finger-tip {
    left: 223px;
    top: 188px;
    width: 30px;
    height: 23px;
    background: radial-gradient(circle at 55% 40%, #e3c1b4 0%, #d7ad9f 74%, #ca9d8d 100%);
    border-radius: 50%;
    z-index: 6;
  }

  .hero-bottom {
    left: 0;
    top: 188px;
    width: 294px;
    height: 220px;
    border-top-right-radius: 18px;
    border-bottom-right-radius: 112px;
    overflow: hidden;
    background:
      linear-gradient(161deg, rgba(242,246,248,1) 0%, rgba(214,224,231,0.95) 17%, rgba(160,180,199,0.86) 31%, rgba(15,26,45,0.98) 66%, rgba(67,98,123,0.94) 100%);
  }
  .tablet {
    left: -8px;
    top: 30px;
    width: 314px;
    height: 115px;
    background: linear-gradient(180deg, #fcfdfe 0%, #f6f8fb 100%);
    border-radius: 14px;
    transform: rotate(11deg);
    box-shadow:
      0 0 0 8px rgba(16,21,29,0.92),
      0 12px 20px rgba(0,0,0,0.26);
    z-index: 7;
  }
  .tablet-screen {
    left: 9px;
    top: 8px;
    width: 296px;
    height: 98px;
    border-radius: 10px;
    background: linear-gradient(180deg, #fafbfc 0%, #eef2f5 100%);
    overflow: hidden;
  }
  .rb-word {
    left: 77px;
    top: 23px;
    color: #3a3a3a;
    font-size: 14px;
    line-height: 14px;
    font-style: italic;
    transform: rotate(-4deg);
  }
  .rb-berger {
    left: 33px;
    top: 29px;
    color: #404040;
    font-size: 28px;
    line-height: 26px;
    font-style: italic;
    letter-spacing: -0.06em;
    transform: rotate(-6deg);
  }
  .mini-bars {
    left: 69px;
    top: 61px;
    width: 78px;
    height: 19px;
  }
  .mini-bars span {
    position: absolute;
    bottom: 0;
    width: 10px;
    background: #b9e3ff;
  }
  .mini-bars .b1 { left: 0; height: 7px; }
  .mini-bars .b2 { left: 14px; height: 11px; }
  .mini-bars .b3 { left: 28px; height: 9px; }
  .mini-bars .b4 { left: 42px; height: 15px; }
  .mini-bars .b5 { left: 56px; height: 12px; }

  .tablet-b {
    left: 171px;
    top: 8px;
    width: 110px;
    height: 81px;
    background: linear-gradient(125deg, #cfd5da 0%, #f0f2f4 30%, #c3c8cc 56%, #788189 100%);
    clip-path: polygon(0 0, 58% 0, 78% 8%, 94% 20%, 100% 36%, 91% 47%, 83% 55%, 91% 64%, 100% 79%, 95% 93%, 84% 100%, 0 100%, 35% 52%);
    filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.10));
  }

  .hand-left {
    left: -10px;
    top: 95px;
    width: 45px;
    height: 39px;
    background: linear-gradient(135deg, #efcabd 0%, #ddb19f 100%);
    border-radius: 22px 14px 18px 22px;
    transform: rotate(18deg);
    z-index: 8;
  }

  .logo {
    right: 30px;
    top: 22px;
    width: 118px;
    height: 52px;
  }
  .logo-roland {
    left: 34px;
    top: 1px;
    color: #454545;
    font-size: 12px;
    line-height: 12px;
    text-align: right;
    width: 42px;
  }
  .logo-text {
    left: 0;
    top: 18px;
    width: 76px;
    color: #1b1b1b;
    font-size: 22px;
    line-height: 22px;
    letter-spacing: -0.05em;
    text-align: right;
  }
  .logo-mark {
    left: 82px;
    top: 1px;
    width: 36px;
    height: 50px;
  }

  .bottom-strip {
    left: 0;
    bottom: 0;
    width: 1280px;
    height: 1px;
    background: #000;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="title-block">
      <div class="title-f">F.</div>
      <div class="title-text">Your contacts at<br>Roland Berger</div>
    </div>

    <div class="hero">
      <div class="hero-top"></div>
      <div class="arm"></div>
      <div class="finger"></div>
      <div class="finger-tip"></div>

      <div class="hero-bottom">
        <div class="tablet">
          <div class="tablet-screen">
            <div class="rb-word">Roland</div>
            <div class="rb-berger">Berger</div>
            <div class="mini-bars">
              <span class="b1"></span>
              <span class="b2"></span>
              <span class="b3"></span>
              <span class="b4"></span>
              <span class="b5"></span>
            </div>
            <div class="tablet-b"></div>
          </div>
        </div>
        <div class="hand-left"></div>
      </div>
    </div>

    <div class="logo">
      <div class="logo-roland">Roland</div>
      <div class="logo-text">Berger</div>
      <svg class="logo-mark" viewBox="0 0 31 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="gLogo" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c7ccd0"/>
            <stop offset="35%" stop-color="#f0f2f3"/>
            <stop offset="70%" stop-color="#959ea5"/>
            <stop offset="100%" stop-color="#5f6971"/>
          </linearGradient>
        </defs>
        <path d="M0,0 L15,0 C24,0 31,7 31,16 C31,22 28,27 23,30 C28,32 31,37 31,43 C31,46 30,48 28,48 L0,48 Z" fill="url(#gLogo)"/>
      </svg>
    </div>

    <div class="bottom-strip"></div>
  </div>
</body>
</html>
