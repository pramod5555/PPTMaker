  .logo .bmark {

    height: 52px;
    border-radius: 0 18px 18px 0;
    background: linear-gradient(90deg, #6c747b 0%, #c7ccd1 56%, #6e777d 100%);
    overflow: hidden;
  }
  .logo .bmark:before,
  .logo .bmark:after {
    content: "";
    position: absolute;
    left: 0;
    width: 18px;
    height: 22px;
    background: #f4f4f4;
  }
  .logo .bmark:before {
    top: 2px;
    border-bottom-right-radius: 15px;

  .logo .bmark:after {
