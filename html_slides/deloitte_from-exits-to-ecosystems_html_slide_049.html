<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0" />
<title>Expectations for World Security in 2025</title>
<style>
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family: "Arial Rounded MT Bold", "Trebuchet MS", Arial, Helvetica, sans-serif;
  }
  .slide{
    position:relative;
    width:1280px;
    height:720px;
    overflow:hidden;
    background:#1b3346;
  }
  .slide > div{
    position:absolute;
    box-sizing:border-box;
  }

  .photo{
    right:0;
    top:0;
    width:780px;
    height:720px;
    background:
      radial-gradient(circle at 98% 20%, rgba(255,255,255,.9) 0 36px, rgba(255,255,255,.15) 72px, rgba(255,255,255,0) 95px),
      radial-gradient(circle at 96% 60%, rgba(91,214,255,.7) 0 42px, rgba(91,214,255,.22) 75px, rgba(91,214,255,0) 108px),
      radial-gradient(circle at 100% 46%, rgba(255,214,76,.55) 0 14px, rgba(255,214,76,.14) 28px, rgba(255,214,76,0) 44px),
      radial-gradient(circle at 59% 67%, rgba(255,214,168,.72) 0 42px, rgba(255,214,168,.18) 82px, rgba(255,214,168,0) 118px),
      radial-gradient(circle at 48% 68%, rgba(220,231,223,.35) 0 56px, rgba(220,231,223,.08) 100px, rgba(220,231,223,0) 132px),
      linear-gradient(180deg, #c8d3d2 0%, #93a2a8 25%, #65717a 48%, #43444a 63%, #2d2d31 78%, #3a312f 100%);
    z-index:1;
  }
  .photo::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.10)),
      radial-gradient(ellipse at 55% 80%, rgba(0,0,0,.38) 0%, rgba(0,0,0,.12) 30%, rgba(0,0,0,0) 60%);
  }

  .dark-diagonal{
    left:0;
    top:0;
    width:1000px;
    height:720px;
    background:linear-gradient(90deg, #0d4055 0%, #06244b 100%);
    clip-path:polygon(0 0, 95.5% 0, 28.8% 100%, 0 100%);
    z-index:10;
  }

  .headline{
    left:47px;
    top:154px;
    width:510px;
    color:#f4f4f4;
    font-weight:900;
    font-size:66px;
    line-height:1.16;
    letter-spacing:-0.045em;
    z-index:20;
    text-shadow:0 1px 0 rgba(0,0,0,.08);
  }

  .footer{
    left:49px;
    bottom:18px;
    color:#dbe4ea;
    font-size:14px;
    font-weight:500;
    letter-spacing:-0.01em;
    z-index:20;
    opacity:.96;
    font-family: Arial, Helvetica, sans-serif;
  }

  .purple-corner{
    right:0;
    bottom:0;
    width:118px;
    height:278px;
    background:#4d2b78;
    clip-path:polygon(100% 0, 100% 100%, 0 100%);
    z-index:12;
  }

  .teal-ribbon{
    right:58px;
    bottom:-1px;
    width:250px;
    height:147px;
    background:#29adb0;
    clip-path:polygon(118px 0, 250px 0, 132px 147px, 0 147px);
    z-index:13;
  }

  .person-shadow{
    left:782px;
    top:73px;
    width:470px;
    height:620px;
    background:radial-gradient(ellipse at 40% 55%, rgba(0,0,0,.18) 0%, rgba(0,0,0,.09) 42%, rgba(0,0,0,0) 72%);

    z-index:3;
  }

    z-index:4;
    transform:rotate(2deg);

    transform:rotate(4deg);

  .bang2{

    height:218px;
    background:linear-gradient(180deg, rgba(48,24,18,.98) 0%, rgba(16,10,10,.99) 100%);
    border-radius:50% 50% 48% 48% / 8% 8% 88% 88%;
    transform:rotate(6deg);
    z-index:6;
  }
  .bang3{

    width:66px;
    height:232px;

    border-radius:50% 50% 46% 46% / 8% 8% 88% 88%;
    transform:rotate(4deg);
    z-index:6;
  }

  .eye{

    top:250px;
    width:64px;
    height:16px;
    border-top:3px solid rgba(78,47,34,.9);

  }

    z-index:3;
  }

    background:linear-gradient(180deg, #fbfdff 0%, #eef4fb 52%, #dfe8f1 100%);

  .mask-fold1{ left:808px; top:336px; width:154px; transform:rotate(-7deg); }
  .mask-fold2{ left:801px; top:360px; width:161px; transform:rotate(-7deg); }
  .mask-fold3{ left:795px; top:384px; width:165px; transform:rotate(-7deg); }
  .mask-fold4{ left:790px; top:408px; width:159px; transform:rotate(-8deg); }

    top:309px;
    width:7px;
    height:140px;
    background:#d7dee8;
    border-radius:4px;
    transform:rotate(-12deg);
    z-index:11;
  }
  .mask-edge-right{
    left:1008px;
    top:312px;
    width:8px;
    height:122px;
    background:#d7dee8;
    border-radius:4px;
    transform:rotate(-16deg);
    z-index:11;
  }

  .strap-top{
    left:1029px;
    top:321px;
    width:105px;
    height:6px;
    background:#f7fbff;
    border-radius:6px;
    transform:rotate(3deg);
    box-shadow:0 0 0 1px rgba(220,227,234,.55) inset;
    z-index:9;

  .strap-bottom{

    top:429px;
    width:118px;
    height:6px;

    border-radius:6px;

    background:

    border-radius:46% 44% 34% 30% / 44% 42% 34% 32%;
    transform:rotate(8deg);
    z-index:2;
  }

  .coat{
    left:935px;

    background:
      repeating-linear-gradient(34deg, rgba(255,255,255,.10) 0 2px, rgba(0,0,0,0) 5px, rgba(0,0,0,0) 10px),
      linear-gradient(180deg, #505356 0%, #26282d 100%);
    border-radius:18% 20% 0 0 / 12% 14% 0 0;
    clip-path:polygon(0 17%, 51% 0, 100% 19%, 100% 100%, 12% 100%);
    transform:rotate(9deg);
    z-index:2;
  }
  .coat-front{
    left:1013px;
    top:503px;
    width:134px;
    height:217px;
    background:
      repeating-linear-gradient(34deg, rgba(255,255,255,.11) 0 2px, rgba(0,0,0,0) 5px, rgba(0,0,0,0) 10px),
      linear-gradient(180deg, #4a4d50 0%, #24262b 100%);
    clip-path:polygon(6% 0, 100% 16%, 100% 100%, 15% 100%, 0 20%);
    z-index:3;
  }
</style>
</head>

  <div class="slide">

    <div class="mask-fold3"></div>
    <div class="mask-fold4"></div>
    <div class="strap-top"></div>

    <div class="dark-diagonal"></div>
    <div class="purple-corner"></div>

    <div class="headline">Expectations for<br>World Security<br>in 2025</div>
