<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF REO APD 2024 – slide_001 – Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #e8e8e8;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #1a1a1a;
  }
  /* Gray topographic mesh */
  .mesh {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(160,160,160,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(160,160,160,0.3) 1px, transparent 1px);
    background-size: 44px 44px;
    transform: perspective(700px) rotateX(10deg);
    transform-origin: bottom center;
  }
  .wave {
    position: absolute; left: -10%; width: 120%; height: 150px;
    background: linear-gradient(180deg, transparent, rgba(140,140,140,0.18), transparent);
    border-radius: 50%;
  }
  .wave1 { bottom: 28%; transform: scaleX(1.4) rotate(-3deg); }
  .wave2 { bottom: 44%; transform: scaleX(1.2) rotate(-1.5deg); }

  .org-name {
    position: absolute; left: 64px; top: 36px;
    font-size: 15px; font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase; color: #333;
  }
  .main-title {
    position: absolute; left: 64px; top: 90px;
    font-size: 90px; font-weight: 900; line-height: 0.95;
    text-transform: uppercase; letter-spacing: -2px; color: #009ba8;
  }
  .region-bar {
    position: absolute; left: 0; right: 0; top: 420px; height: 60px;
    background: #009ba8; display: flex; align-items: center; padding: 0 64px;
  }
  .region-bar span { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
  .subtitle {
    position: absolute; left: 64px; top: 496px;
    font-size: 22px; font-weight: 400; color: #333; line-height: 1.35;
  }
  .date {
    position: absolute; left: 64px; bottom: 36px;
    font-size: 32px; font-weight: 900; color: #1a1a1a; line-height: 1.1;
  }
  .seal {
    position: absolute; right: 64px; bottom: 28px;
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #1a1a1a;
    text-align: center; letter-spacing: 0.5px; line-height: 1.3; text-transform: uppercase;
    background: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="mesh"></div>
  <div class="wave wave2"></div>
  <div class="wave wave1"></div>
  <div class="org-name">International Monetary Fund</div>
  <div class="main-title">REGIONAL<br>ECONOMIC<br>OUTLOOK</div>
  <div class="region-bar"><span>Asia and Pacific</span></div>
  <div class="subtitle">Steady Growth amid<br>Diverging Prospects</div>
  <div class="date">2024<br>APR</div>
  <div class="seal">INTER-<br>NATIONAL<br>MONETARY<br>FUND</div>
</div>
</body>
</html>
