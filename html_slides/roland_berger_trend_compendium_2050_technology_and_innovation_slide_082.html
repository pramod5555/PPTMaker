<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>Roland Berger Title Slide</title>
<style>
  html, body {
    margin: 0;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #1f2329;
    font-family: Arial, Helvetica, "Segoe UI", sans-serif;
  }

  #slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #1f2329;
  }

  .abs { position: absolute; }

  .center-group {
    position: absolute;
    left: 382px;
    top: 238px;
    width: 520px;
    height: 270px;
  }

  .roland {
    position: absolute;
    left: 178px;
    top: 54px;
    color: #f2f2f2;
    font-size: 52px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: -0.03em;
    white-space: nowrap;
  }

  .berger {
    position: absolute;
    left: 24px;
    top: 91px;
    color: #f2f2f2;
    font-size: 84px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: -0.045em;
    white-space: nowrap;
  }

  .thinkact {
    position: absolute;
    left: 142px;
    top: 178px;
    color: #6f7b8b;
    font-size: 31px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.005em;
    white-space: nowrap;
  }

  .logo-shadow {
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.42));
  }

  .page {
    position: absolute;
    left: 27px;
    bottom: 12px;
    color: #f0f0f0;
    font-size: 18px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: 0;
  }

  .mini-brand {
    position: absolute;
    right: 16px;
    bottom: 10px;
    width: 72px;
    height: 28px;
  }

  .mini-roland {
    position: absolute;
    left: 0;
    top: 6px;
    width: 44px;
    text-align: right;
    color: #0b0c0f;
    font-size: 7px;
    line-height: 1;
    font-weight: 400;
    white-space: nowrap;
  }

  .mini-berger {
    position: absolute;
    left: 0;
    top: 12px;
    width: 44px;
    text-align: right;
    color: #0b0c0f;
    font-size: 14px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.04em;
    white-space: nowrap;
  }

  .mini-b {
    position: absolute;
    left: 47px;
    top: 0;
    width: 19px;
    height: 24px;
  }
</style>
</head>
<body>
  <div id="slide">
    <div class="center-group">
      <div class="roland">Roland</div>
      <div class="berger">Berger</div>
      <div class="thinkact">THINK:ACT</div>

      <svg class="abs logo-shadow" style="left:359px; top:0; width:154px; height:254px;" viewBox="0 0 154 254" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="rbgrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#9ca4ab"/>
            <stop offset="16%" stop-color="#d9dde0"/>
            <stop offset="28%" stop-color="#f2f4f5"/>
            <stop offset="40%" stop-color="#d4d9dd"/>
            <stop offset="60%" stop-color="#abb2b8"/>
            <stop offset="100%" stop-color="#7d858c"/>
          </linearGradient>
        </defs>
        <path d="M0 0 L68 0 C105 0 145 31 145 64 C145 93 129 112 111 119 C133 124 154 149 154 186 C154 225 121 254 83 254 L0 254 Z" fill="url(#rbgrad)"/>
      </svg>
    </div>

    <div class="page">82</div>

    <div class="mini-brand">
      <div class="mini-roland">Roland</div>
      <div class="mini-berger">Berger</div>
      <svg class="mini-b logo-shadow" viewBox="0 0 18 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="miniGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#b0b7bd"/>
            <stop offset="25%" stop-color="#eef1f3"/>
            <stop offset="58%" stop-color="#aab2b8"/>
            <stop offset="100%" stop-color="#7f878e"/>
          </linearGradient>
        </defs>
        <path d="M0 0 L8 0 C13 0 17 3 17 7 C17 10 15 12 13 13 C16 14 18 17 18 20 C18 23 16 24 12 24 L0 24 Z" fill="url(#miniGrad)"/>
      </svg>
    </div>
  </div>
</body>
</html>
