    margin: 0;
    padding: 0;
    background: #222;
    font-family: Arial, Helvetica, sans-serif;

  .slide {
    position: relative;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #f1efeb;
  }
  .slide > div {
    position: absolute;
    box-sizing: border-box;
  }

    top: 0;

    height: 720px;

    z-index: 0;
  }
  .window-left {
    left: 668px;
    top: 185px;
    width: 170px;
    height: 280px;
    background: linear-gradient(180deg, rgba(154,161,173,0.7), rgba(104,113,129,0.28));
    filter: blur(5px);
    z-index: 1;
  }
  .sofa {
    left: 1066px;
    top: 195px;
    width: 214px;
    height: 325px;
    background: linear-gradient(180deg, #3e4147 0%, #212329 100%);
    border-top-left-radius: 18px;
    border-bottom-left-radius: 20px;
    filter: blur(1px);
    z-index: 1;
  }
  .torso {
    left: 845px;
    top: -8px;
    width: 340px;
    height: 470px;
    background: linear-gradient(180deg, #e6cf95 0%, #d8b869 34%, #d6b05b 70%, #c99645 100%);

    z-index: 2;

  .neck {
    left: 916px;

  .necklace {
    left: 949px;
    top: 119px;

    border-radius: 50%;
    z-index: 4;
    box-shadow: 0 0 2px rgba(255,255,255,0.2);
  }
  .necklace::before {
    content: "";
    position: absolute;
    left: 5px;
    top: -22px;
    width: 2px;
    height: 22px;
    background: rgba(231,222,203,0.85);
  }
  .arm-left {
    left: 730px;
    top: 361px;
    width: 170px;
    height: 55px;
    background: linear-gradient(180deg, #9c6440 0%, #7f4b2c 100%);
    border-radius: 28px;
    transform: rotate(12deg);
    filter: blur(1px);
    z-index: 4;
  }
  .paper-held {
    left: 598px;
    top: 397px;
    width: 140px;
    height: 48px;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(233,237,240,0.9));
    clip-path: polygon(0 15%, 88% 0, 100% 63%, 15% 100%);
    transform: rotate(13deg);
    filter: blur(0.5px);
    z-index: 5;
  }
  .paper-held::before,
  .paper-top::before,
  .paper-main::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(12deg, transparent 0 16%, rgba(132,185,228,0.55) 16% 21%, transparent 21% 34%, rgba(132,185,228,0.45) 34% 38%, transparent 38% 100%);

  .paper-main {

    transform: rotate(8deg);
    filter: blur(2px);
    z-index: 2;
  }
  .paper-top {
    left: 555px;
    top: 408px;

    height: 52px;

    filter: blur(0.4px);
    z-index: 3;
  }

  .calculator {
    left: 629px;
    top: 584px;
    width: 185px;
    height: 53px;
    background: linear-gradient(180deg, #ffffff 0%, #e6e6e8 100%);

    transform: rotate(12deg);
    box-shadow: 0 3px 8px rgba(0,0,0,0.18);
    z-index: 5;
  }
  .calc-screen {
    left: 708px;
    top: 596px;
    width: 63px;
    height: 17px;
    background: linear-gradient(180deg, #847f79 0%, #66615b 100%);
    border-radius: 2px;
    transform: rotate(12deg);
    z-index: 6;
  }
  .calc-key {
    width: 8px;
    height: 5px;
    background: rgba(238,238,238,0.96);
    border-radius: 2px;
    transform: rotate(12deg);
    z-index: 6;
  }

  /* blue overlay */
  .overlay {
    left: 0;
    top: 0;
    width: 922px;
    height: 720px;
    background: linear-gradient(90deg, #0a4258 0%, #002453 100%);
    clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%);
    z-index: 10;
  }

  .purple {
    right: 0;
    bottom: 0;
    width: 120px;
    height: 280px;
    background: #4b2875;
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
    z-index: 11;
  }
  .teal {
    right: 58px;
    bottom: 0;
    width: 252px;
    height: 147px;
    background: #2aafb3;
    clip-path: polygon(55% 0, 100% 0, 45% 100%, 0 100%);

  }

  .title {
    left: 46px;
    top: 151px;
    width: 485px;
    color: #f4f4f4;
    font-family: "Baloo 2", Arial, sans-serif;
    font-size: 68px;
    line-height: 0.9;
    font-weight: 800;
    letter-spacing: -1.2px;
    z-index: 20;

  .footer-left {
