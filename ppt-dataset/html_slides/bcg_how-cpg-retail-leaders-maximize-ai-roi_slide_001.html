<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>BCG – slide_001 – Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #0d1a2a;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #ffffff;
  }
  /* Portrait-orientation cover — dark background with tablet photo */
  .photo-bg {
    position: absolute; left: 0; top: 0; width: 1280px; height: 720px;
    background: linear-gradient(160deg, #080e18 0%, #0d1e38 25%, #1a3060 50%, #2a4880 70%, #3060a0 85%, #406888 100%);
    opacity: 0.9;
  }
  /* Subtle light reflection bottom-right */
  .light {
    position: absolute; right: 60px; bottom: 80px;
    width: 320px; height: 200px;
    background: radial-gradient(ellipse at 60% 60%, rgba(100,180,255,0.3) 0%, transparent 70%);
  }

  /* Top-left header area */
  .logo-bcg {
    position: absolute; left: 64px; top: 40px;
    font-size: 28px; font-weight: 900; color: #ffffff; letter-spacing: 1px;
  }
  /* Separator line under logos */
  .logo-line {
    position: absolute; left: 64px; top: 84px; width: 220px;
    height: 1px; background: rgba(255,255,255,0.35);
  }
  .board-brief {
    position: absolute; left: 64px; top: 100px;
    font-size: 12px; font-weight: 700; color: #aaccee; letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Main title */
  .title {
    position: absolute; left: 64px; top: 136px; width: 720px;
    font-size: 56px; font-weight: 700; color: #ffffff; line-height: 1.1;
  }
  /* Subtitle */
  .subtitle {
    position: absolute; left: 64px; top: 420px; width: 640px;
    font-size: 20px; font-weight: 400; color: #aaccee; line-height: 1.4;
  }
  /* Authors */
  .authors {
    position: absolute; left: 64px; bottom: 48px; width: 640px;
    font-size: 11px; color: #88aabb; line-height: 1.5;
  }
  /* Green accent line — bottom */
  .accent-line {
    position: absolute; left: 0; bottom: 0; right: 0; height: 4px;
    background: #00cc66;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="photo-bg"></div>
  <div class="light"></div>
  <div class="logo-bcg">BCG</div>
  <div class="logo-line"></div>
  <div class="board-brief">Board Brief</div>
  <div class="title">AI in CPG and Retail: How Winners Are Pulling Ahead</div>
  <div class="subtitle">A Collaboration of the Consumer Goods Forum and Boston Consulting Group</div>
  <div class="authors">By Mai-Britt Poulsen, Nicolas de Bellefonds, Yotam Ariav, Nate Shenck, and Arnaud Bassoulet</div>
  <div class="accent-line"></div>
</div>
</body>
</html>
