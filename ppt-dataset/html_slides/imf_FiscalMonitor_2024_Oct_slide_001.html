<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF Fiscal Monitor Oct 2024 – slide_001 – Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #4a1a7a;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #ffffff;
  }
  /* Grid wave mesh overlay */
  .mesh {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(180,100,255,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,100,255,0.18) 1px, transparent 1px);
    background-size: 48px 48px;
    /* Perspective-distort approximation via skew */
    transform: perspective(600px) rotateX(18deg);
    transform-origin: bottom center;
  }
  /* Shimmer waves */
  .wave1 {
    position: absolute; left: -10%; bottom: 20%; width: 120%; height: 200px;
    background: linear-gradient(180deg, transparent, rgba(140,60,220,0.25), transparent);
    border-radius: 50%;
    transform: scaleX(1.4) rotate(-6deg);
  }
  .wave2 {
    position: absolute; left: -10%; bottom: 35%; width: 120%; height: 160px;
    background: linear-gradient(180deg, transparent, rgba(160,80,240,0.18), transparent);
    border-radius: 50%;
    transform: scaleX(1.3) rotate(-3deg);
  }

  .org-name {
    position: absolute; left: 64px; top: 36px;
    font-size: 15px; font-weight: 400; letter-spacing: 2.5px;
    text-transform: uppercase; color: #ffffff;
  }
  .main-title {
    position: absolute; left: 64px; top: 90px;
    font-size: 118px; font-weight: 900; line-height: 0.95;
    color: #ffffff; text-transform: uppercase; letter-spacing: -2px;
  }
  .subtitle {
    position: absolute; left: 64px; top: 490px;
    font-size: 28px; font-weight: 400; color: #ffffff; line-height: 1.3;
  }
  .date {
    position: absolute; left: 64px; bottom: 36px;
    font-size: 32px; font-weight: 900; color: #ffffff; line-height: 1.1;
  }
  .seal {
    position: absolute; right: 64px; bottom: 28px;
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #fff;
    text-align: center; letter-spacing: 0.5px; line-height: 1.3;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="mesh"></div>
  <div class="wave2"></div>
  <div class="wave1"></div>
  <div class="org-name">International Monetary Fund</div>
  <div class="main-title">FISCAL<br>MONITOR</div>
  <div class="subtitle">Putting a Lid on Public Debt</div>
  <div class="date">2024<br>OCT</div>
  <div class="seal">INTER-<br>NATIONAL<br>MONETARY<br>FUND</div>
</div>
</body>
</html>
