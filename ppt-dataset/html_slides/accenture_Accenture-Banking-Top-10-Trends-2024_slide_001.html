<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Banking on AI – Accenture slide_001</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .slide {
    width: 1280px;
    height: 720px;
    position: relative;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
  }

  /* Full-bleed abstract globe illustration — approximated as a radial
     multi-stop gradient centered on the right half of the slide */
  .bg-globe {
    position: absolute;
    right: -60px;
    top: -80px;
    width: 820px;
    height: 880px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at 42% 48%,
      #ffffff 0%,
      #e8c8f0 6%,
      #c87de8 14%,
      #a030d8 22%,
      #7020b8 30%,
      #4a10a0 38%,
      #2a0880 46%,
      #1a0460 58%,
      #0a0230 80%,
      transparent 100%
    );
    opacity: 0.95;
  }

  /* Magenta/pink swirl overlay — left arc sweeping from bottom-left */
  .swirl-left {
    position: absolute;
    left: -100px;
    bottom: -120px;
    width: 580px;
    height: 580px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at 60% 40%,
      #d040c0 0%,
      #a020a0 25%,
      #601070 55%,
      transparent 80%
    );
    opacity: 0.75;
    transform: rotate(-20deg);
  }

  /* Blue highlight arc — upper-right of globe */
  .highlight-arc {
    position: absolute;
    right: 90px;
    top: 30px;
    width: 260px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at 50% 50%,
      #60c8ff 0%,
      #2080e0 40%,
      transparent 75%
    );
    opacity: 0.6;
  }

  /* Title */
  .title {
    position: absolute;
    left: 64px;
    top: 180px;
    width: 560px;
    color: #ffffff;
    font-size: 72px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -1px;
  }

  /* Subtitle */
  .subtitle {
    position: absolute;
    left: 64px;
    top: 370px;
    color: #e0e0e0;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  /* Accenture wordmark — bottom-right */
  .wordmark {
    position: absolute;
    right: 56px;
    bottom: 40px;
    color: #ffffff;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-globe"></div>
  <div class="swirl-left"></div>
  <div class="highlight-arc"></div>
  <div class="title">Banking on AI</div>
  <div class="subtitle">Banking Top 10 Trends for 2024</div>
  <div class="wordmark">accenture</div>
</div>
</body>
</html>
