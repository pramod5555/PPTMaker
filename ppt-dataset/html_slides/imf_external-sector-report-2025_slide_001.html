<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF External Sector Report 2025 – slide_001 – Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #e8720c;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #ffffff;
  }
  .org-name {
    position: absolute; left: 80px; top: 40px;
    font-size: 18px; font-weight: 400; letter-spacing: 2px;
    text-transform: uppercase; color: #ffffff;
  }
  .main-title {
    position: absolute; left: 80px; top: 100px;
    font-size: 120px; font-weight: 900; line-height: 1.0;
    letter-spacing: -2px; color: #ffffff;
    text-transform: uppercase;
  }
  .subtitle {
    position: absolute; left: 80px; top: 490px;
    font-size: 30px; font-weight: 400; line-height: 1.3; color: #ffffff;
  }
  .year {
    position: absolute; left: 80px; bottom: 36px;
    font-size: 36px; font-weight: 900; color: #ffffff;
  }
  /* IMF seal — bottom right, approximated as circle */
  .seal {
    position: absolute; right: 80px; bottom: 28px;
    width: 80px; height: 80px; border-radius: 50%;
    border: 3px solid #ffffff;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #ffffff;
    text-align: center; letter-spacing: 0.5px; line-height: 1.3;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="org-name">International Monetary Fund</div>
  <div class="main-title">EXTERNAL<br>SECTOR<br>REPORT</div>
  <div class="subtitle">Global Imbalances<br>in a Shifting World</div>
  <div class="year">2025</div>
  <div class="seal">INTER-<br>NATIONAL<br>MONETARY<br>FUND</div>
</div>
</body>
</html>
