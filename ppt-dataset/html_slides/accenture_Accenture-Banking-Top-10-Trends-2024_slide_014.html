<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Accenture – slide_014 – Trend 3 section opener</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #ffffff;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #1a1a1a;
  }
  /* Dark photo — woman smiling with rainbow neon, left half */
  .photo {
    position: absolute; left: 0; top: 0;
    width: 680px; height: 720px;
    background: linear-gradient(130deg, #060318 0%, #120838 15%, #2a1060 30%, #6020a0 50%, #d040c0 70%, #f0b060 88%, #ffd060 100%);
  }
  /* Gradient fade to white on right side of photo */
  .photo-fade {
    position: absolute; left: 490px; top: 0;
    width: 200px; height: 720px;
    background: linear-gradient(to right, transparent, #ffffff);
  }

  /* Trend label + title — right panel */
  .trend-tag {
    position: absolute; right: 64px; top: 140px;
    font-size: 16px; font-weight: 700; color: #7b2d8b;
  }
  .trend-title {
    position: absolute; right: 64px; top: 172px; width: 480px; text-align: right;
    font-size: 44px; font-weight: 300; color: #1a1a1a; line-height: 1.1;
  }

  /* Purple callout box — bottom-right */
  .callout {
    position: absolute; right: 0; bottom: 0;
    width: 560px;
    background: rgba(90, 0, 160, 0.90);
    padding: 30px 64px 36px 40px;
  }
  .callout-text {
    font-size: 14px; font-style: italic;
    color: #f0e0ff; line-height: 1.62;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="photo"></div>
  <div class="photo-fade"></div>

  <div class="trend-tag">Trend: 3</div>
  <div class="trend-title">All the risk we cannot see</div>

  <div class="callout">
    <div class="callout-text">In 2024, banks will be confronted by a variety of risks: some familiar, others less predictable. We have identified five that we think deserve attention. Planning for the unplanned will pay dividends.</div>
  </div>
</div>
</body>
</html>
