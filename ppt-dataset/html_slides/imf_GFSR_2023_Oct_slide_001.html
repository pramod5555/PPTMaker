<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>IMF GFSR Oct 2023 – slide_001 – Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1280px; height: 720px;
    position: relative; overflow: hidden;
    background: #3d6b1e;
    font-family: 'Calibri', 'Arial', 'Helvetica', sans-serif;
    color: #ffffff;
  }
  /* Topographic mesh overlay */
  .mesh {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(100,180,60,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100,180,60,0.2) 1px, transparent 1px);
    background-size: 48px 48px;
    transform: perspective(600px) rotateX(14deg);
    transform-origin: bottom center;
  }
  /* Wave curves */
  .wave {
    position: absolute; left: -10%; width: 120%; height: 180px;
    background: linear-gradient(180deg, transparent, rgba(80,160,40,0.25), transparent);
    border-radius: 50%;
  }
  .wave1 { bottom: 28%; transform: scaleX(1.3) rotate(-4deg); }
  .wave2 { bottom: 44%; transform: scaleX(1.2) rotate(-2deg); }

  .org-name {
    position: absolute; left: 64px; top: 36px;
    font-size: 15px; font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase;
  }
  .main-title {
    position: absolute; left: 64px; top: 90px;
    font-size: 100px; font-weight: 900; line-height: 0.95;
    text-transform: uppercase; letter-spacing: -2px;
  }
  .subtitle {
    position: absolute; left: 64px; top: 510px;
    font-size: 26px; font-weight: 400; line-height: 1.35;
  }
  .date {
    position: absolute; left: 64px; bottom: 36px;
    font-size: 32px; font-weight: 900; line-height: 1.1;
  }
  .seal {
    position: absolute; right: 64px; bottom: 28px;
    width: 88px; height: 88px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #fff;
    text-align: center; letter-spacing: 0.5px; line-height: 1.3; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="mesh"></div>
  <div class="wave wave2"></div>
  <div class="wave wave1"></div>
  <div class="org-name">International Monetary Fund</div>
  <div class="main-title">GLOBAL<br>FINANCIAL<br>STABILITY<br>REPORT</div>
  <div class="subtitle">Financial and Climate Policies<br>for a High-Interest-Rate Era</div>
  <div class="date">2023<br>OCT</div>
  <div class="seal">INTER-<br>NATIONAL<br>MONETARY<br>FUND</div>
</div>
</body>
</html>
